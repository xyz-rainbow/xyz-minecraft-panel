apiVersion: v1
kind: ConfigMap
metadata:
  name: minecraft-panel-config
  namespace: gaming
data:
  server.js: |
    const http = require('http');
    const fs = require('fs');
    const path = require('path');
    const net = require('net');
    const os = require('os');
    const { exec } = require('child_process');

    const PORT = 8080;
    const DATA_DIR = '/data';
    const PANEL_USER = process.env.PANEL_USERNAME || 'admin';
    const PANEL_PASS = process.env.PANEL_PASSWORD || 'admin';
    const SESSION_COOKIE = 'panel_session';
    const STATE_FILE = path.join(DATA_DIR, '.server_state');
    const BACKUPS_DIR = path.join(DATA_DIR, 'backups');
    let backupInProgress = false;
    let restoreInProgress = false;
    let backupState = { 
        active: false,
        zipPath: null,
        startTime: null,
        label: '',
        estimatedTotalBytes: 0,
    };
    let restoreState = {
        active: false,
        zipPath: null,
        startTime: null,
        estimatedTotalBytes: 0,
    };
    const activeZipDownloads = new Map();

    // Helper to parse server.properties
    function getRconConfig() {
        try {
            const content = fs.readFileSync(path.join(DATA_DIR, 'server.properties'), 'utf8');
            const config = {};
            content.split('\n').forEach(line => {
                if (line.startsWith('#') || !line.includes('=')) return;
                const [key, ...valParts] = line.split('=');
                config[key.trim()] = valParts.join('=').trim();
            });
            return {
                enabled: config['enable-rcon'] === 'true',
                port: parseInt(config['rcon.port']) || 25575,
                password: config['rcon.password'] || '',
                gamePort: parseInt(config['server-port']) || 25565
            };
        } catch (e) {
            console.error('Failed to parse server.properties:', e);
            return { enabled: false, port: 25575, password: '', gamePort: 25565 };
        }
    }

    // Helper to get target server state
    function getTargetState() {
        try {
            if (fs.existsSync(STATE_FILE)) {
                return fs.readFileSync(STATE_FILE, 'utf8').trim();
            }
        } catch (e) {}
        return 'running'; // default
    }

    // Helper to write target server state
    function setTargetState(state) {
        try {
            fs.writeFileSync(STATE_FILE, state, 'utf8');
        } catch (e) {
            console.error('Failed to write state file:', e);
        }
    }

    // Helper to get JVM and Java Memory statistics
    function getMemoryStats() {
        let used = 0;
        let total = os.totalmem();
        
        // Try to get Java memory usage (Resident Set Size) from shared process namespace
        try {
            const pids = fs.readdirSync('/proc');
            for (const pid of pids) {
                if (!/^\d+$/.test(pid)) continue;
                try {
                    const cmdline = fs.readFileSync(`/proc/${pid}/cmdline`, 'utf8');
                    if (cmdline.includes('java')) {
                        const status = fs.readFileSync(`/proc/${pid}/status`, 'utf8');
                        const match = status.match(/VmRSS:\s+(\d+)\s+kB/);
                        if (match) {
                            used = parseInt(match[1]) * 1024;
                            break;
                        }
                    }
                } catch (e) {}
            }
        } catch (e) {}

        // Parse Xmx limit from user_jvm_args.txt
        try {
            const argsPath = path.join(DATA_DIR, 'user_jvm_args.txt');
            if (fs.existsSync(argsPath)) {
                const content = fs.readFileSync(argsPath, 'utf8');
                const match = content.match(/-Xmx(\d+)([gGmMkK])/);
                if (match) {
                    const value = parseInt(match[1]);
                    const unit = match[2].toLowerCase();
                    if (unit === 'g') total = value * 1024 * 1024 * 1024;
                    else if (unit === 'm') total = value * 1024 * 1024;
                    else if (unit === 'k') total = value * 1024;
                }
            }
        } catch (e) {}

        // Fallbacks if Java is not running or cgroup read is needed
        if (used === 0) {
            try {
                if (fs.existsSync('/sys/fs/cgroup/memory.current')) {
                    used = parseInt(fs.readFileSync('/sys/fs/cgroup/memory.current', 'utf8').trim());
                } else {
                    used = os.totalmem() - os.freemem();
                }
            } catch (e) {
                used = os.totalmem() - os.freemem();
            }
        }

        return {
            used,
            total,
            percent: Math.max(0, Math.min(100, Math.round((used / total) * 100)))
        };
    }

    // Helper to write VarInt
    function writeVarInt(val) {
        const buf = [];
        while (true) {
            if ((val & ~0x7F) === 0) {
                buf.push(val);
                break;
            }
            buf.push((val & 0x7F) | 0x80);
            val >>>= 7;
        }
        return Buffer.from(buf);
    }

    // Helper to read VarInt
    function readVarInt(buffer, offset = 0) {
        let value = 0;
        let length = 0;
        let currentByte;
        while (true) {
            currentByte = buffer[offset + length];
            if (currentByte === undefined) return { value: 0, length: 0 };
            value |= (currentByte & 0x7F) << (length * 7);
            length++;
            if ((currentByte & 0x80) !== 0x80) break;
        }
        return { value, length };
    }

    // Ping Minecraft Server List Ping (SLP) protocol
    function pingMinecraft(host, port) {
        return new Promise((resolve, reject) => {
            const client = new net.Socket();
            client.setTimeout(2000);
            
            client.connect(port, host, () => {
                const protocolVersion = writeVarInt(767); // 1.21.1
                const hostBuf = Buffer.from(host, 'utf8');
                const hostLen = writeVarInt(hostBuf.length);
                const portBuf = Buffer.alloc(2);
                portBuf.writeUInt16BE(port, 0);
                const nextState = writeVarInt(1);

                const handshakeData = Buffer.concat([protocolVersion, hostLen, hostBuf, portBuf, nextState]);
                const handshakeHeader = Buffer.concat([writeVarInt(0x00), handshakeData]);
                const handshakePacket = Buffer.concat([writeVarInt(handshakeHeader.length), handshakeHeader]);

                const requestPacket = Buffer.concat([writeVarInt(1), writeVarInt(0x00)]);

                client.write(Buffer.concat([handshakePacket, requestPacket]));
            });

            let dataBuffer = Buffer.alloc(0);
            client.on('data', (chunk) => {
                dataBuffer = Buffer.concat([dataBuffer, chunk]);
                if (dataBuffer.length < 5) return;
                try {
                    const len1 = readVarInt(dataBuffer, 0);
                    if (len1.length === 0) return;
                    if (dataBuffer.length < len1.length + len1.value) return;

                    const packetId = readVarInt(dataBuffer, len1.length);
                    const jsonLen = readVarInt(dataBuffer, len1.length + packetId.length);
                    const jsonStr = dataBuffer.toString('utf8', len1.length + packetId.length + jsonLen.length);

                    client.destroy();
                    resolve(JSON.parse(jsonStr));
                } catch (e) {
                    // Wait for more data
                }
            });

            client.on('error', (err) => {
                client.destroy();
                reject(err);
            });

            client.on('timeout', () => {
                client.destroy();
                reject(new Error('Connection timeout'));
            });
        });
    }

    // Custom RCON client implementation (zero dependencies)
    function sendRconCommand(command) {
        const rcon = getRconConfig();
        if (!rcon.enabled) {
            return Promise.reject(new Error('RCON is disabled in server.properties'));
        }
        return new Promise((resolve, reject) => {
            const client = new net.Socket();
            let authed = false;
            let responseBuffer = Buffer.alloc(0);
            let reqId = 123;
            
            client.setTimeout(5000);
            client.connect(rcon.port, '127.0.0.1', () => {
                sendPacket(3, rcon.password);
            });

            client.on('data', (data) => {
                responseBuffer = Buffer.concat([responseBuffer, data]);
                processBuffer();
            });

            client.on('timeout', () => {
                client.destroy();
                reject(new Error('Connection timeout'));
            });

            client.on('error', (err) => {
                client.destroy();
                reject(err);
            });

            function sendPacket(type, payload) {
                const payloadBuf = Buffer.from(payload + '\0', 'utf8');
                const packetSize = 4 + 4 + payloadBuf.length + 1;
                const buf = Buffer.alloc(4 + packetSize);
                buf.writeInt32LE(packetSize, 0);
                buf.writeInt32LE(reqId, 4);
                buf.writeInt32LE(type, 8);
                payloadBuf.copy(buf, 12);
                buf.write('\0', buf.length - 1);
                client.write(buf);
            }

            function processBuffer() {
                while (responseBuffer.length >= 12) {
                    const length = responseBuffer.readInt32LE(0);
                    if (responseBuffer.length < 4 + length) return;
                    const packet = responseBuffer.subarray(0, 4 + length);
                    responseBuffer = responseBuffer.subarray(4 + length);
                    const id = packet.readInt32LE(4);
                    const type = packet.readInt32LE(8);
                    const payload = packet.subarray(12, packet.length - 2).toString('utf8');
                    
                    if (type === 2) {
                        if (id === -1) {
                            client.destroy();
                            reject(new Error('RCON Authentication failed'));
                            return;
                        }
                        authed = true;
                        reqId = 456;
                        sendPacket(2, command);
                    } else if (type === 0) {
                        client.destroy();
                        resolve(payload);
                        return;
                    }
                }
            }
        });
    }

    // Path sanitization helper
    function resolveSafePath(userPath) {
        const resolved = path.resolve(DATA_DIR, userPath || '');
        if (!resolved.startsWith(DATA_DIR)) {
            throw new Error('Access Denied: Path escapes server directory');
        }
        return resolved;
    }

    // Cookie parser helper
    function parseCookies(req) {
        const list = {};
        const rc = req.headers.cookie;
        if (rc) {
            rc.split(';').forEach(cookie => {
                const parts = cookie.split('=');
                list[parts.shift().trim()] = decodeURI(parts.join('='));
            });
        }
        return list;
    }

    // Auth verification helper
    function isAuthenticated(req) {
        const cookies = parseCookies(req);
        const expectedToken = Buffer.from(`${PANEL_USER}:${PANEL_PASS}`).toString('base64');
        return cookies[SESSION_COOKIE] === expectedToken;
    }

    // JSON responder helper
    function sendJSON(res, data, status = 200) {
        res.writeHead(status, { 'Content-Type': 'application/json' });
        res.end(JSON.stringify(data));
    }

    // Main HTTP Server
    const server = http.createServer((req, res) => {
        const parsedUrl = new URL(req.url, `http://${req.headers.host || 'localhost'}`);
        const pathname = parsedUrl.pathname;
        const queryPath = parsedUrl.searchParams.get('path') || '';

        // CORS headers
        res.setHeader('Access-Control-Allow-Origin', '*');
        res.setHeader('Access-Control-Allow-Headers', 'Content-Type');
        res.setHeader('Access-Control-Allow-Methods', 'GET, POST, OPTIONS');

        if (req.method === 'OPTIONS') {
            res.writeHead(200);
            res.end();
            return;
        }

        // Static Files: Serve single-file dashboard
        if (pathname === '/' || pathname === '/index.html') {
            const htmlPath = path.resolve('/app/index.html');
            fs.readFile(htmlPath, 'utf8', (err, content) => {
                if (err) {
                    res.writeHead(500, { 'Content-Type': 'text/plain' });
                    res.end('Error loading dashboard page: ' + err.message);
                    return;
                }
                res.writeHead(200, { 'Content-Type': 'text/html' });
                res.end(content);
            });
            return;
        }

        // API Endpoint: Login
        if (pathname === '/api/login') {
            if (req.method !== 'POST') return sendJSON(res, { error: 'Method not allowed' }, 405);
            let body = '';
            req.on('data', chunk => body += chunk);
            req.on('end', () => {
                try {
                    const { username, password } = JSON.parse(body);
                    if (username === PANEL_USER && password === PANEL_PASS) {
                        const token = Buffer.from(`${PANEL_USER}:${PANEL_PASS}`).toString('base64');
                        res.writeHead(200, {
                            'Set-Cookie': `${SESSION_COOKIE}=${token}; Path=/; HttpOnly; Max-Age=86400; SameSite=Strict`,
                            'Content-Type': 'application/json'
                        });
                        res.end(JSON.stringify({ success: true }));
                    } else {
                        sendJSON(res, { error: 'Invalid credentials' }, 401);
                    }
                } catch (e) {
                    sendJSON(res, { error: 'Invalid body' }, 400);
                }
            });
            return;
        }

        // API Endpoint: Logout
        if (pathname === '/api/logout') {
            res.writeHead(200, {
                'Set-Cookie': `${SESSION_COOKIE}=; Path=/; HttpOnly; Max-Age=0; SameSite=Strict`,
                'Content-Type': 'application/json'
            });
            res.end(JSON.stringify({ success: true }));
            return;
        }

        // Verify Authentication for all other API endpoints
        if (!isAuthenticated(req)) {
            return sendJSON(res, { error: 'Unauthorized' }, 401);
        }

        // API Endpoint: Server Status (Pings Minecraft and checks shared namespace stats)
        if (pathname === '/api/status') {
            const rcon = getRconConfig();
            const targetState = getTargetState();
            pingMinecraft('127.0.0.1', rcon.gamePort)
                .then(slpRes => {
                    let online = slpRes.players ? slpRes.players.online : 0;
                    let max = slpRes.players ? slpRes.players.max : 20;

                    sendJSON(res, {
                        status: 'online',
                        players: { online, max },
                        memory: getMemoryStats()
                    });
                })
                .catch(err => {
                    // SLP failed, determine if we are starting or offline
                    const status = (targetState === 'running') ? 'starting' : 'offline';
                    sendJSON(res, {
                        status: status,
                        error: err.message,
                        players: { online: 0, max: 0 },
                        memory: getMemoryStats()
                    });
                });
            return;
        }

        // API Endpoint: Start Minecraft Server
        if (pathname === '/api/start') {
            if (req.method !== 'POST') return sendJSON(res, { error: 'Method not allowed' }, 405);
            setTargetState('running');
            sendJSON(res, { success: true });
            return;
        }

        // API Endpoint: Stop Minecraft Server (Sends RCON stop and falls back to killing process)
        if (pathname === '/api/stop') {
            if (req.method !== 'POST') return sendJSON(res, { error: 'Method not allowed' }, 405);
            setTargetState('stopped');
            sendRconCommand('stop')
                .then(output => {
                    sendJSON(res, { success: true, response: output });
                })
                .catch(err => {
                    // Fallback: kill Java directly (needs shareProcessNamespace: true in Pod spec)
                    exec('pkill -f java', (err2, stdout, stderr) => {
                        sendJSON(res, { success: true, warning: 'Forced shutdown via pkill' });
                    });
                });
            return;
        }

        // API Endpoint: Send Console Command
        if (pathname === '/api/console') {
            if (req.method !== 'POST') return sendJSON(res, { error: 'Method not allowed' }, 405);
            let body = '';
            req.on('data', chunk => body += chunk);
            req.on('end', () => {
                try {
                    const { command } = JSON.parse(body);
                    sendRconCommand(command)
                        .then(output => sendJSON(res, { success: true, response: output }))
                        .catch(err => sendJSON(res, { error: err.message }, 500));
                } catch (e) {
                    sendJSON(res, { error: 'Invalid body' }, 400);
                }
            });
            return;
        }

        // API Endpoint: List Files
        if (pathname === '/api/files') {
            try {
                const targetDir = resolveSafePath(queryPath);
                fs.readdir(targetDir, { withFileTypes: true }, (err, items) => {
                    if (err) return sendJSON(res, { error: err.message }, 500);
                    const files = items.map(item => {
                        const itemPath = path.join(targetDir, item.name);
                        let size = 0;
                        let mtime = null;
                        try {
                            const stat = fs.statSync(itemPath);
                            size = stat.size;
                            mtime = stat.mtime;
                        } catch (e) {}
                        return {
                            name: item.name,
                            isDir: item.isDirectory(),
                            size,
                            mtime
                        };
                    }).sort((a, b) => b.isDir - a.isDir || a.name.localeCompare(b.name));
                    sendJSON(res, { success: true, files });
                });
            } catch (e) {
                sendJSON(res, { error: e.message }, 400);
            }
            return;
        }

        // API Endpoint: Read File Content
        if (pathname === '/api/file') {
            try {
                const targetFile = resolveSafePath(queryPath);
                fs.readFile(targetFile, (err, data) => {
                    if (err) return sendJSON(res, { error: err.message }, 500);
                    const fileName = path.basename(targetFile);
                    res.writeHead(200, { 
                        'Content-Type': 'application/octet-stream',
                        'Content-Disposition': `attachment; filename="${fileName}"`
                    });
                    res.end(data);
                });
            } catch (e) {
                sendJSON(res, { error: e.message }, 400);
            }
            return;
        }

        // API Endpoint: Save File Content
        if (pathname === '/api/save') {
            if (req.method !== 'POST') return sendJSON(res, { error: 'Method not allowed' }, 405);
            let body = '';
            req.on('data', chunk => body += chunk);
            req.on('end', () => {
                try {
                    const { path: fileRelPath, content } = JSON.parse(body);
                    const targetFile = resolveSafePath(fileRelPath);
                    fs.writeFile(targetFile, content, 'utf8', (err) => {
                        if (err) return sendJSON(res, { error: err.message }, 500);
                        sendJSON(res, { success: true });
                    });
                } catch (e) {
                    sendJSON(res, { error: 'Invalid body' }, 400);
                }
            });
            return;
        }

        // API Endpoint: Delete File or Folder
        if (pathname === '/api/delete') {
            if (req.method !== 'POST') return sendJSON(res, { error: 'Method not allowed' }, 405);
            let body = '';
            req.on('data', chunk => body += chunk);
            req.on('end', () => {
                try {
                    const { path: fileRelPath } = JSON.parse(body);
                    const targetPath = resolveSafePath(fileRelPath);
                    fs.rm(targetPath, { recursive: true, force: true }, (err) => {
                        if (err) return sendJSON(res, { error: err.message }, 500);
                        sendJSON(res, { success: true });
                    });
                } catch (e) {
                    sendJSON(res, { error: 'Invalid body' }, 400);
                }
            });
            return;
        }

        // API Endpoint: Make Directory
        if (pathname === '/api/mkdir') {
            if (req.method !== 'POST') return sendJSON(res, { error: 'Method not allowed' }, 405);
            let body = '';
            req.on('data', chunk => body += chunk);
            req.on('end', () => {
                try {
                    const { path: fileRelPath } = JSON.parse(body);
                    const targetPath = resolveSafePath(fileRelPath);
                    fs.mkdir(targetPath, { recursive: true }, (err) => {
                        if (err) return sendJSON(res, { error: err.message }, 500);
                        sendJSON(res, { success: true });
                    });
                } catch (e) {
                    sendJSON(res, { error: 'Invalid body' }, 400);
                }
            });
            return;
        }

        // API Endpoint: Upload File
        if (pathname === '/api/upload') {
            if (req.method !== 'POST') return sendJSON(res, { error: 'Method not allowed' }, 405);
            try {
                const targetFile = resolveSafePath(queryPath);
                const writeStream = fs.createWriteStream(targetFile);
                req.pipe(writeStream);
                req.on('end', () => sendJSON(res, { success: true }));
                writeStream.on('error', (err) => sendJSON(res, { error: err.message }, 500));
            } catch (e) {
                sendJSON(res, { error: e.message }, 400);
            }
            return;
        }

        // API Endpoint: Restart
        if (pathname === '/api/restart') {
            if (req.method !== 'POST') return sendJSON(res, { error: 'Method not allowed' }, 405);
            setTargetState('running');
            sendRconCommand('stop')
                .then(output => sendJSON(res, { success: true, response: output }))
                .catch(err => {
                    exec('pkill -f java', (err2, stdout, stderr) => {
                        sendJSON(res, { success: true, warning: 'Forced restart via pkill' });
                    });
                });
            return;
        }

        // API Endpoint: SSE Log Stream
        if (pathname === '/api/logs') {
            const logPath = path.join(DATA_DIR, 'logs', 'latest.log');
            res.writeHead(200, {
                'Content-Type': 'text/event-stream',
                'Cache-Control': 'no-cache',
                'Connection': 'keep-alive',
                'Access-Control-Allow-Origin': '*'
            });

            let fileExists = fs.existsSync(logPath);
            if (fileExists) {
                try {
                    const data = fs.readFileSync(logPath, 'utf8');
                    const lines = data.split('\n');
                    const tailLines = lines.slice(-200).join('\n');
                    res.write(`data: ${JSON.stringify(tailLines)}\n\n`);
                } catch (e) {}
            }

            let pos = fileExists ? fs.statSync(logPath).size : 0;
            const watchInterval = setInterval(() => {
                if (!fs.existsSync(logPath)) return;
                try {
                    const stat = fs.statSync(logPath);
                    if (stat.size > pos) {
                        const stream = fs.createReadStream(logPath, { start: pos, end: stat.size });
                        stream.on('data', chunk => {
                            res.write(`data: ${JSON.stringify(chunk.toString())}\n\n`);
                        });
                        pos = stat.size;
                    } else if (stat.size < pos) {
                        pos = 0;
                    }
                } catch (e) {}
            }, 1000);

            req.on('close', () => {
                clearInterval(watchInterval);
                res.end();
            });
            return;
        }

        // API Endpoint: Download Folder as Zip (on-the-fly streaming)
        if (pathname === '/api/download-folder') {
            try {
                const targetPath = resolveSafePath(queryPath);
                if (!fs.existsSync(targetPath) || !fs.statSync(targetPath).isDirectory()) {
                    return sendJSON(res, { error: 'Directory not found' }, 404);
                }
                
                const folderName = path.basename(targetPath) || 'root';

                // Kill existing zip process for this specific folder to prevent duplicates
                if (activeZipDownloads.has(targetPath)) {
                    console.log(`[Download Folder] Killing previous zip process for ${targetPath}`);
                    const oldProc = activeZipDownloads.get(targetPath);
                    oldProc.kill('SIGKILL');
                    activeZipDownloads.delete(targetPath);
                }
                
                res.writeHead(200, {
                    'Content-Type': 'application/zip',
                    'Content-Disposition': `attachment; filename="${folderName}.zip"`
                });
                
                const { spawn } = require('child_process');
                // Optimization: Level 0 (Store Only) and -n .jar:.zip to avoid corruption and CPU overload
                const zipProc = spawn('zip', ['-0', '-n', '.jar:.zip', '-r', '-', '.', '-x', 'backups/*', '-x', 'lost+found/*'], { cwd: targetPath });
                
                activeZipDownloads.set(targetPath, zipProc);

                zipProc.stdout.pipe(res);
                
                zipProc.stderr.on('data', (data) => {
                    console.error(`[Download Folder] Zip log: ${data.toString().trim()}`);
                });
                
                zipProc.on('exit', () => {
                    if (activeZipDownloads.get(targetPath) === zipProc) {
                        activeZipDownloads.delete(targetPath);
                    }
                });

                req.on('close', () => {
                    if (!zipProc.killed) {
                        zipProc.kill('SIGKILL');
                    }
                    if (activeZipDownloads.get(targetPath) === zipProc) {
                        activeZipDownloads.delete(targetPath);
                    }
                });
            } catch (e) {
                sendJSON(res, { error: e.message }, 400);
            }
            return;
        }

        // API Endpoint: List Backups
        if (pathname === '/api/backups') {
            if (!fs.existsSync(BACKUPS_DIR)) {
                try { fs.mkdirSync(BACKUPS_DIR, { recursive: true }); } catch (e) {}
            }
            fs.readdir(BACKUPS_DIR, (err, files) => {
                if (err) return sendJSON(res, { error: err.message }, 500);
                
                const list = [];
                files.forEach(file => {
                    if (!file.endsWith('.zip')) return;
                    try {
                        const stat = fs.statSync(path.join(BACKUPS_DIR, file));
                        const match = file.match(/^backup_(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})(?:_(.*))?\.zip$/);
                        let dateStr = stat.mtime.toLocaleString();
                        let label = '';
                        if (match) {
                            dateStr = `${match[1]}-${match[2]}-${match[3]} ${match[4]}:${match[5]}:${match[6]}`;
                            label = match[7] ? decodeURIComponent(match[7].replace(/_/g, ' ')) : '';
                        }
                        list.push({
                            filename: file,
                            size: stat.size,
                            date: dateStr,
                            label: label,
                            mtime: stat.mtimeMs
                        });
                    } catch (e) {}
                });
                // Sort by mtime descending
                list.sort((a, b) => b.mtime - a.mtime);
                sendJSON(res, { success: true, backups: list, backupInProgress, restoreInProgress });
            });
            return;
        }

        // API Endpoint: Create Backup
        if (pathname === '/api/backups/create') {
            if (req.method !== 'POST') return sendJSON(res, { error: 'Method not allowed' }, 405);
            if (backupInProgress || restoreInProgress) {
                return sendJSON(res, { error: 'An operation is already in progress' }, 400);
            }
            
            let body = '';
            req.on('data', chunk => body += chunk);
            req.on('end', () => {
                let label = '';
                try {
                    const parsed = JSON.parse(body);
                    label = parsed.label ? encodeURIComponent(parsed.label.trim().replace(/\s+/g, '_')) : '';
                } catch (e) {}
                
                backupInProgress = true;
                backupState = {
                    active: true,
                    zipPath: null,
                    startTime: Date.now(),
                    label: label || 'backup',
                    estimatedTotalBytes: 0,
                };
                
                // Format file name
                const now = new Date();
                const pad = (n) => String(n).padStart(2, '0');
                const dateStr = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
                const timeStr = `${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
                const zipName = `backup_${dateStr}_${timeStr}${label ? '_' + label : ''}.zip`;
                const zipPath = path.join(BACKUPS_DIR, zipName);
                backupState.zipPath = zipPath;
                
                if (!fs.existsSync(BACKUPS_DIR)) {
                    try { fs.mkdirSync(BACKUPS_DIR, { recursive: true }); } catch (e) {}
                }

                const wasRunning = getTargetState() === 'running';
                
                // Set state to stopped so the wrapper doesn't boot it back up immediately
                setTargetState('stopped');
                
                console.log('[Backup] Stopping Minecraft server for backup...');
                
                const runBackupZip = () => {
                    console.log('[Backup] Server stopped. Pre-estimating total data size...');
                    // Pre-estimate total data size for progress
                    exec(`du -sb "${DATA_DIR}" --exclude="${DATA_DIR}/backups" 2>/dev/null | awk '{print $1}'`, (err, stdout) => {
                        const estimated = parseInt(stdout.trim()) || 0;
                        backupState.estimatedTotalBytes = estimated;
                    });
                    
                    // Start the compression command
                    // Optimization: Level 0 (Store Only) and -n .jar:.zip for maximum integrity
                    const cmd = `zip -0 -n .jar:.zip -r -q "${zipPath}" . -x "backups/*" -x "lost+found/*"`;
                    console.log(`[Backup] Executing compression: ${cmd}`);
                    exec(cmd, { cwd: DATA_DIR }, (err, stdout, stderr) => {
                        if (err) {
                            console.error('[Backup] Compression failed:', err.message);
                        } else {
                            console.log('[Backup] Compression completed successfully.');
                        }
                        
                        // Restart the server if it was running before
                        if (wasRunning) {
                            console.log('[Backup] Restarting Minecraft server (restoring running state)...');
                            setTargetState('running');
                        }
                        
                        backupInProgress = false;
                        backupState.active = false;
                    });
                };

                // Trigger stop
                sendRconCommand('stop')
                    .catch(err => {
                        console.log('[Backup] RCON stop failed, forcing pkill: ', err.message);
                        return new Promise((resolve) => exec('pkill -f java', resolve));
                    })
                    .then(() => {
                        // Wait 3 seconds for the server port/java process to completely stop
                        return new Promise((resolve) => setTimeout(resolve, 3000));
                    })
                    .then(() => {
                        runBackupZip();
                    });
                
                sendJSON(res, { success: true, message: 'Backup started in background. Server will stop and restart.' });
            });
            return;
        }

        // API Endpoint: Backup & Restore Status (for progress bar - server-side state, client-independent)
        if (pathname === '/api/backups/status') {
            if (!backupState.active && !restoreState.active) {
                return sendJSON(res, { active: false });
            }
            
            if (backupState.active) {
                // zip writes to a random temp file first, then renames to final .zip
                // So we measure ALL files newer than backup start time in BACKUPS_DIR
                let currentBytes = 0;
                try {
                    if (fs.existsSync(BACKUPS_DIR)) {
                        fs.readdirSync(BACKUPS_DIR).forEach(f => {
                            const fp = path.join(BACKUPS_DIR, f);
                            try {
                                const st = fs.statSync(fp);
                                if (st.mtimeMs >= backupState.startTime - 5000) {
                                    currentBytes = Math.max(currentBytes, st.size);
                                }
                            } catch (e) {}
                        });
                    } 
                } catch (e) {}
                
                const elapsed = Math.floor((Date.now() - backupState.startTime) / 1000);
                let percent = 0;
                if (backupState.estimatedTotalBytes > 0) {
                    percent = Math.min(99, Math.floor((currentBytes / backupState.estimatedTotalBytes) * 100));
                } else {
                    percent = Math.min(99, Math.floor(elapsed / 1800 * 100));
                }
                
                return sendJSON(res, {
                    active: true,
                    type: 'backup',
                    percent,
                    elapsed,
                    label: backupState.label,
                    currentBytes,
                    estimatedTotalBytes: backupState.estimatedTotalBytes,
                });
            }
            
            if (restoreState.active) {
                const elapsed = Math.floor((Date.now() - restoreState.startTime) / 1000);
                // Measure files in DATA_DIR excluding backups and lost+found to track extraction
                exec(`du -sb "${DATA_DIR}" --exclude="${DATA_DIR}/backups" --exclude="${DATA_DIR}/lost+found" 2>/dev/null | awk '{print $1}'`, (err, stdout) => {
                    const currentBytes = parseInt(stdout.trim()) || 0;
                    let percent = 0;
                    if (restoreState.estimatedTotalBytes > 0) {
                        percent = Math.min(99, Math.floor((currentBytes / restoreState.estimatedTotalBytes) * 100));
                    } else {
                        percent = Math.min(99, Math.floor(elapsed / 120 * 100)); // assume 2 min fallback
                    }
                    
                    sendJSON(res, {
                        active: true,
                        type: 'restore',
                        percent,
                        elapsed,
                        currentBytes,
                        estimatedTotalBytes: restoreState.estimatedTotalBytes,
                    });
                });
                return;
            }
        }

        // API Endpoint: Delete Backup
        if (pathname === '/api/backups/delete') {
            if (req.method !== 'POST') return sendJSON(res, { error: 'Method not allowed' }, 405);
            let body = '';
            req.on('data', chunk => body += chunk);
            req.on('end', () => {
                try {
                    const { filename } = JSON.parse(body);
                    if (!filename || !filename.endsWith('.zip') || filename.includes('/') || filename.includes('..')) {
                        return sendJSON(res, { error: 'Invalid filename' }, 400);
                    }
                    const targetFile = path.join(BACKUPS_DIR, filename);
                    if (fs.existsSync(targetFile)) {
                        fs.unlink(targetFile, (err) => {
                            if (err) return sendJSON(res, { error: err.message }, 500);
                            sendJSON(res, { success: true });
                        });
                    } else {
                        sendJSON(res, { error: 'File not found' }, 404);
                    }
                } catch (e) {
                    sendJSON(res, { error: 'Invalid body' }, 400);
                }
            });
            return;
        }

        // API Endpoint: Download Backup
        if (pathname === '/api/backups/download') {
            const fileParam = queryPath;
            if (!fileParam || !fileParam.endsWith('.zip') || fileParam.includes('/') || fileParam.includes('..')) {
                return sendJSON(res, { error: 'Invalid filename' }, 400);
            }
            const targetFile = path.join(BACKUPS_DIR, fileParam);
            if (fs.existsSync(targetFile)) {
                res.writeHead(200, {
                    'Content-Type': 'application/zip',
                    'Content-Disposition': `attachment; filename="${fileParam}"`,
                    'Content-Length': fs.statSync(targetFile).size
                });
                const stream = fs.createReadStream(targetFile);
                stream.pipe(res);
            } else {
                sendJSON(res, { error: 'File not found' }, 404);
            }
            return;
        }

        // API Endpoint: Restore Backup
        if (pathname === '/api/backups/restore') {
            if (req.method !== 'POST') return sendJSON(res, { error: 'Method not allowed' }, 405);
            if (backupInProgress || restoreInProgress) {
                return sendJSON(res, { error: 'An operation is already in progress' }, 400);
            }
            
            let body = '';
            req.on('data', chunk => body += chunk);
            req.on('end', () => {
                try {
                    const { filename } = JSON.parse(body);
                    if (!filename || !filename.endsWith('.zip') || filename.includes('/') || filename.includes('..')) {
                        return sendJSON(res, { error: 'Invalid filename' }, 400);
                    }
                    const zipPath = path.join(BACKUPS_DIR, filename);
                    if (!fs.existsSync(zipPath)) {
                        return sendJSON(res, { error: 'Backup file not found' }, 404);
                    }
                    
                    restoreInProgress = true;
                    restoreState = {
                        active: true,
                        zipPath: zipPath,
                        startTime: Date.now(),
                        estimatedTotalBytes: 0,
                    };
                    
                    try {
                        restoreState.estimatedTotalBytes = fs.statSync(zipPath).size;
                    } catch (e) {}
                    
                    setTargetState('stopped');
                    
                    console.log('[Restore] Stopping Minecraft server for restoration...');
                    sendRconCommand('stop')
                        .catch(err => {
                            console.log('[Restore] RCON stop failed, forcing pkill: ', err.message);
                            return new Promise((resolve) => exec('pkill -f java', resolve));
                        })
                        .then(() => {
                            return new Promise((resolve) => setTimeout(resolve, 3000));
                        })
                        .then(() => {
                            console.log('[Restore] Cleaning active files in /data...');
                            fs.readdir(DATA_DIR, (err, items) => {
                                if (err) throw err;
                                
                                let pending = items.length;
                                if (pending === 0) return performUnzip();
                                
                                items.forEach(item => {
                                    if (item === 'backups' || item === '.server_state' || item === 'lost+found') {
                                        pending--;
                                        if (pending === 0) performUnzip();
                                        return;
                                    } 
                                    
                                    const itemPath = path.join(DATA_DIR, item);
                                    fs.rm(itemPath, { recursive: true, force: true }, (errrm) => {
                                        if (errrm) console.error(`[Restore] Failed to delete ${item}:`, errrm.message);
                                        pending--;
                                        if (pending === 0) performUnzip();
                                    });
                                });
                            });
                        });
                    
                    function performUnzip() { 
                        console.log(`[Restore] Extracting backup ${zipPath}...`);
                        exec(`unzip -q -o "${zipPath}" -d "${DATA_DIR}"`, (err, stdout, stderr) => {
                            if (err) {
                                console.error('[Restore] Unzip failed:', err.message);
                                restoreInProgress = false;
                                restoreState.active = false;
                                return;
                            }
                            
                            console.log('[Restore] Unzip completed. Restarting Minecraft server...');
                            setTargetState('running');
                            restoreInProgress = false;
                            restoreState.active = false;
                        });
                    }
                    
                    sendJSON(res, { success: true, message: 'Restore started. Server will restart.' });
                } catch (e) {
                    sendJSON(res, { error: 'Invalid body' }, 400);
                }
            });
            return;
        }

        sendJSON(res, { error: 'Endpoint not found' }, 404);
    });

    server.listen(PORT, '0.0.0.0', () => {
        console.log(`Minecraft control panel sidecar running on port ${PORT}`);
    });

  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Minecraft Server Control Panel</title>
        <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
        <style>
            :root {
                --bg-main: #09090b;
                --accent-primary: #a855f7;
                --accent-secondary: #06b6d4;
                --accent-lime: #84cc16;
                --accent-pink: #d946ef;
                --glass-bg: rgba(10, 10, 12, 0.90);
                --glass-border: rgba(255, 255, 255, 0.06);
                --text-main: #f4f4f5;
                --text-muted: #a1a1aa;
                --font-display: 'Space Grotesk', sans-serif;
                --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: 'Inter', 'Comfortaa', sans-serif;
            }

            body {
                background-color: var(--bg-main);
                background-image:
                    linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
                background-size: 40px 40px;
                color: var(--text-main);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow-x: hidden;
                position: relative;
            }

            /* Ambient Glow Blobs */
            .bg-glow-container {
                position: fixed;
                inset: 0;
                opacity: 0.3;
                pointer-events: none;
                z-index: 0;
                overflow: hidden;
            }
            .bg-glow-1 {
                position: absolute;
                top: 10%;
                left: 5%;
                width: 45vw; height: 45vw;
                border-radius: 50%;
                background: radial-gradient(circle, var(--accent-lime) 0%, transparent 65%);
                filter: blur(100px);
            }
            .bg-glow-2 {
                position: absolute;
                bottom: 5%;
                right: 5%;
                width: 50vw; height: 50vw;
                border-radius: 50%;
                background: radial-gradient(circle, var(--accent-primary) 0%, transparent 65%);
                filter: blur(100px);
            }
            .bg-glow-3 {
                position: absolute;
                top: 50%;
                left: 55%;
                width: 40vw; height: 40vw;
                border-radius: 50%;
                background: radial-gradient(circle, var(--accent-secondary) 0%, transparent 65%);
                filter: blur(120px);
            }

            /* RGB Border Animation for Dashboard */
            @keyframes rotate-conic {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }

            .dashboard-rgb-wrapper {
                position: relative;
                overflow: hidden;
                border-radius: 22px;
                padding: 2px;
                width: 100%;
                height: 100vh;
                z-index: 1;
                box-shadow: 0 0 60px -15px rgba(132, 204, 22, 0.15);
            }
            .dashboard-rgb-wrapper::before {
                content: '';
                position: absolute;
                top: -50%; left: -50%;
                width: 200%; height: 200%;
                background: conic-gradient(
                    from 0deg,
                    var(--accent-lime),
                    var(--accent-primary),
                    var(--accent-pink),
                    var(--accent-secondary),
                    var(--accent-lime)
                );
                animation: rotate-conic 12s linear infinite;
                z-index: 0;
                opacity: 0.8;
            }

            /* Floating Cyan Scrollbar */
            ::-webkit-scrollbar {
                width: 12px;
                height: 12px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background-color: var(--accent-secondary);
                border-radius: 10px;
                border: 3px solid transparent;
                background-clip: padding-box;
            }
            ::-webkit-scrollbar-thumb:hover {
                background-color: #0891b2;
            }

            /* Login Interface */
            #login-wrapper {
                position: fixed;
                top: 0; left: 0; width: 100vw; height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background-color: #03040b;
                background-image: 
                    linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
                background-size: 40px 40px;
                z-index: 1000;
            }

            .rgb-border-wrapper {
                position: relative;
                padding: 3px;
                border-radius: 23px;
                background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
                background-size: 400%;
                animation: rgbBorder 10s linear infinite;
            }

            @keyframes rgbBorder {
                0% { background-position: 0 0; }
                100% { background-position: 400% 0; }
            }

            #login-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: 100%;
                min-width: 380px;
                max-width: 420px;
                padding: 2.5rem;
                border-radius: 20px;
                background: #111827;
                box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
                text-align: center;
                animation: fadeIn 0.5s ease-out;
            }

            #login-container h1 {
                font-size: 1.8rem;
                margin-bottom: 0.5rem;
                font-weight: 700;
                background: linear-gradient(135deg, #a78bfa, #22d3ee);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .lime-text {
                background: none !important;
                -webkit-background-clip: unset !important;
                -webkit-text-fill-color: #a3e635 !important;
                color: #a3e635;
            }

            #login-container p {
                color: var(--text-muted);
                font-size: 0.9rem;
                margin-bottom: 2rem;
            }

            .input-group {
                width: 100%;
                margin-bottom: 1.25rem;
                text-align: left;
            }

            .input-group label {
                display: block;
                font-size: 0.8rem;
                font-weight: 500;
                margin-bottom: 0.5rem;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .input-group input {
                width: 100%;
                padding: 0.75rem 1rem;
                border-radius: 8px;
                background: rgba(15, 23, 42, 0.6);
                border: 1px solid var(--glass-border);
                color: white;
                font-size: 1rem;
                outline: none;
                transition: border-color 0.2s, box-shadow 0.2s;
            }

            .input-group input:focus {
                border-color: var(--accent-primary);
                box-shadow: 0 0 10px rgba(139, 92, 246, 0.25);
            }

            .btn {
                width: 100%;
                padding: 0.75rem;
                border-radius: 8px;
                border: none;
                background: linear-gradient(135deg, var(--accent-primary), #6366f1);
                color: white;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
                transition: transform 0.1s, box-shadow 0.2s;
            }

            .btn:hover {
                box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
                transform: translateY(-1px);
            }

            .btn:active {
                transform: translateY(0);
            }

            /* Dashboard Interface */
            #dashboard-container {
                display: none;
                width: 100%;
                height: 100%;
                border-radius: 20px;
                background: var(--glass-bg);
                backdrop-filter: blur(30px);
                -webkit-backdrop-filter: blur(30px);
                border: none;
                box-shadow: none;
                overflow: hidden;
                grid-template-columns: 260px 1fr;
                animation: fadeIn 0.4s ease-out;
                position: relative;
                z-index: 1;
            }

            /* Sidebar */
            aside {
                background: rgba(10, 8, 22, 0.5);
                border-right: 1px solid var(--glass-border);
                padding: 2rem 1.5rem;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }

            .brand {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                margin-bottom: 2.5rem;
            }

            .brand svg {
                width: 32px;
                height: 32px;
                fill: var(--accent-secondary);
            }

            .brand h2 {
                font-size: 1.25rem;
                font-weight: 700;
                letter-spacing: -0.02em;
            }

            .nav-menu {
                list-style: none;
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
                flex-grow: 1;
            }

            .nav-item {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                padding: 0.75rem 1rem;
                border-radius: 10px;
                color: var(--text-muted);
                text-decoration: none;
                font-size: 0.95rem;
                font-weight: 500;
                cursor: pointer;
                transition: color 0.2s, background 0.2s;
            }

            .nav-item:hover, .nav-item.active {
                color: white;
                background: rgba(255, 255, 255, 0.05);
            }

            .nav-item.active {
                border-left: 3px solid var(--accent-primary);
                border-top-left-radius: 0;
                border-bottom-left-radius: 0;
            }

            .logout-btn {
                margin-top: auto;
                color: #ef4444;
            }

            .logout-btn:hover {
                background: rgba(239, 68, 68, 0.1);
            }

            /* Main Content */
            main {
                display: flex;
                flex-direction: column;
                height: 100%;
                overflow: hidden;
            }

            header {
                padding: 1.5rem 2rem;
                border-bottom: 1px solid var(--glass-border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                background: rgba(10, 8, 22, 0.2);
            }

            .server-info {
                display: flex;
                align-items: center;
                gap: 1.5rem;
            }

            .status-badge {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.35rem 0.75rem;
                border-radius: 20px;
                font-size: 0.8rem;
                font-weight: 600;
                text-transform: uppercase;
                background: rgba(239, 68, 68, 0.15);
                color: #f87171;
            }

            .status-badge.online {
                background: rgba(34, 197, 94, 0.15);
                color: #4ade80;
            }

            .status-badge.starting {
                background: rgba(245, 158, 11, 0.15);
                color: #fbbf24;
            }

            .status-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: currentColor;
                box-shadow: 0 0 8px   currentColor;
            }

            .stats-row {
                display: flex;
                align-items: center;
                gap: 2rem;
            }

            .stat-box {
                font-size: 0.9rem;
                color: var(--text-muted);
            }

            .stat-box span {
                color: white;
                font-weight: 600;
                margin-left: 0.25rem;
            }

            .stat-bar {
                width: 120px;
                height: 6px;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 3px;
                overflow: hidden;
                display: inline-block;
                vertical-align: middle;
                margin-left: 0.5rem;
            }

            .stat-progress {
                height: 100%;
                background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary));
                width: 0%;
                transition: width 0.5s;
            }

            .control-buttons {
                display: flex;
                gap: 0.75rem;
            }

            /* Power Buttons */
            .start-btn {
                background: linear-gradient(135deg, #22c55e, #16a34a) !important;
                color: white;
                width: auto;
                padding: 0.5rem 1.25rem;
                font-size: 0.9rem;
                border-radius: 6px;
            }
            .start-btn:hover {
                box-shadow: 0 0 15px rgba(34, 197, 94, 0.4) !important;
            }

            .stop-btn {
                background: linear-gradient(135deg, #ef4444, #dc2626) !important;
                color: white;
                width: auto;
                padding: 0.5rem 1.25rem;
                font-size: 0.9rem;
                border-radius: 6px;
            }
            .stop-btn:hover {
                box-shadow: 0 0 15px rgba(239, 68, 68, 0.4) !important;
            }

            .restart-btn {
                background: linear-gradient(135deg, #f59e0b, #d97706);
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
                border-radius: 6px;
                width: auto;
            }
            .restart-btn:disabled {
                background: rgba(255,255,255,0.05);
                border: 1px solid var(--glass-border);
                color: var(--text-muted);
                cursor: not-allowed;
                box-shadow: none !important;
                transform: none !important;
            }

            /* View Container */
            .view {
                display: none;
                flex-direction: column;
                flex-grow: 1;
                padding: 2rem;
                overflow: hidden;
            }

            .view.active {
                display: flex;
            }

            /* Console Tab */
            #terminal {
                flex-grow: 1;
                background: #020108;
                border: 1px solid var(--glass-border);
                border-radius: 12px;
                font-family: 'Fira Code', monospace;
                font-size: 0.85rem;
                padding: 1.25rem;
                overflow-y: auto;
                color: #e2e8f0;
                display: flex;
                flex-direction: column;
                gap: 0.25rem;
                box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
            }

            .log-line {
                line-height: 1.4;
                white-space: pre-wrap;
                word-break: break-all;
            }

            .log-line.error { color: #f87171; }
            .log-line.warn { color: #fbbf24; }
            .log-line.info { color: #94a3b8; }

            .console-input-wrapper {
                margin-top: 1rem;
                display: flex;
                gap: 0.75rem;
            }

            .console-input-wrapper input {
                flex-grow: 1;
                background: rgba(15, 23, 42, 0.8);
                border: 1px solid var(--glass-border);
                padding: 0.75rem 1rem;
                border-radius: 8px;
                color: white;
                font-family: 'Fira Code', monospace;
                outline: none;
            }

            .console-input-wrapper input:focus {
                border-color: var(--accent-secondary);
            }

            .console-send {
                width: 100px;
                background: linear-gradient(135deg, var(--accent-secondary), #0891b2);
            }

            /* File Manager Tab */
            .file-actions {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 1.5rem;
            }

            .breadcrumbs {
                font-size: 0.95rem;
                color: var(--text-muted);
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }

            .breadcrumbs span {
                cursor: pointer;
            }

            .breadcrumbs span:hover {
                color: white;
                text-decoration: underline;
            }

            .file-buttons {
                display: flex;
                gap: 0.75rem;
            }

            .file-buttons button, .file-buttons label {
                padding: 0.5rem 1rem;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--glass-border);
                border-radius: 6px;
                font-size: 0.85rem;
                color: white;
                cursor: pointer;
                transition: background 0.2s;
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
            }

            .file-buttons button:hover, .file-buttons label:hover {
                background: rgba(255, 255, 255, 0.1);
            }

            .files-grid-wrapper {
                flex-grow: 1;
                border: 1px solid var(--glass-border);
                border-radius: 12px;
                background: rgba(10, 8, 22, 0.3);
                overflow-y: auto;
                position: relative;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                text-align: left;
            }

            th, td {
                padding: 0.85rem 1.25rem;
                border-bottom: 1px solid var(--glass-border);
                font-size: 0.9rem;
                vertical-align: middle;
            }

            th {
                color: var(--text-muted);
                font-weight: 500;
                background: rgba(0, 0, 0, 0.2);
                position: sticky;
                top: 0;
            }

            tr {
                cursor: pointer;
                transition: background 0.2s;
            }

            tbody tr:nth-child(odd) {
                background: rgba(15, 23, 42, 0.4);
            }

            tbody tr:nth-child(even) {
                background: rgba(30, 41, 59, 0.4);
            }

            tr:hover {
                background: rgba(255, 255, 255, 0.08) !important;
            }

            .file-name-cell {
                display: flex;
                align-items: center;
                gap: 0.75rem;
            }

            .file-icon {
                width: 18px;
                height: 18px;
                fill: var(--text-muted);
            }

            .folder-icon {
                fill: #fbbf24;
            }

            .actions-cell {
                display: flex;
                gap: 0.5rem;
            }

            .action-icon {
                background: none;
                border: none;
                cursor: pointer;
                padding: 0.25rem;
                border-radius: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .action-icon:hover {
                background: rgba(255,255,255,0.08);
            }

            .action-icon svg {
                width: 16px;
                height: 16px;
                fill: var(--text-muted);
            }

            .delete-btn svg {
                fill: #ef4444;
            }

            /* File Editor Modal */
            #editor-modal {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.75);
                backdrop-filter: blur(8px);
                align-items: center;
                justify-content: center;
                z-index: 100;
                padding: 2.5rem;
            }

            .editor-container {
                width: 100%;
                max-width: 1100px;
                height: 100%;
                background: #090810;
                border: 1px solid var(--glass-border);
                border-radius: 16px;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .editor-header {
                padding: 1rem 1.5rem;
                border-bottom: 1px solid var(--glass-border);
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: rgba(255,255,255,0.02);
            }

            .editor-header h3 {
                font-size: 1rem;
                font-weight: 600;
            }

            .editor-body {
                flex-grow: 1;
                position: relative;
            }

            .editor-body textarea {
                width: 100%;
                height: 100%;
                background: transparent;
                border: none;
                color: #e2e8f0;
                font-family: 'Fira Code', monospace;
                font-size: 0.9rem;
                padding: 1.5rem;
                resize: none;
                outline: none;
                line-height: 1.5;
            }

            .editor-footer {
                padding: 1rem 1.5rem;
                border-top: 1px solid var(--glass-border);
                display: flex;
                justify-content: flex-end;
                gap: 1rem;
                background: rgba(255,255,255,0.02);
            }

            .editor-footer button {
                padding: 0.5rem 1.25rem;
                border-radius: 6px;
                font-size: 0.85rem;
                font-weight: 500;
                cursor: pointer;
            }

            .save-btn {
                background: linear-gradient(135deg, var(--accent-primary), #6366f1);
                color: white;
                border: none;
            }

            .cancel-btn {
                background: transparent;
                border: 1px solid var(--glass-border);
                color: var(--text-muted);
            }

            .cancel-btn:hover {
                color: white;
                background: rgba(255,255,255,0.02);
            }

            /* Animations */
            @keyframes fadeIn {
                from { opacity: 0; transform: scale(0.98); }
                to { opacity: 1; transform: scale(1); }
            }

            /* Drag and Drop Overlay */
            .drag-overlay {
                display: none;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(139, 92, 246, 0.15);
                border: 2px dashed var(--accent-primary);
                border-radius: 12px;
                align-items: center;
                justify-content: center;
                font-size: 1.2rem;
                font-weight: 600;
                z-index: 10;
                pointer-events: none;
            }

            /* Floating Progress Bar (Backup/Restore) */
            #operation-progress-bar {
                display: none;
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%);
                width: min(520px, 90vw);
                z-index: 9999;
                border-radius: 16px;
                padding: 14px 20px;
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                transition: all 0.3s ease;
            }
            
            /* Backup Style */
            #operation-progress-bar.type-backup {
                background: rgba(26, 10, 10, 0.90);
                border: 2px solid rgba(239, 68, 68, 0.2);
                box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 20px rgba(239, 68, 68, 0.25);
            }
            #operation-progress-bar.type-backup .bp-title {
                color: #fca5a5;
            }
            #operation-progress-bar.type-backup .bp-percent {
                color: #ef4444;
            }
            #operation-progress-bar.type-backup .bp-fill {
                background: linear-gradient(90deg, #7f1d1d, #ef4444, #f87171);
                box-shadow: 0 0 10px rgba(239, 68, 68, 0.6);
            }
            
            /* Restore Style */
            #operation-progress-bar.type-restore {
                background: rgba(10, 20, 26, 0.90);
                border: 2px solid rgba(6, 182, 212, 0.2);
                box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 20px rgba(6, 182, 212, 0.25);
            }
            #operation-progress-bar.type-restore .bp-title {
                color: #a5f3fc;
            }
            #operation-progress-bar.type-restore .bp-percent {
                color: #06b6d4;
            }
            #operation-progress-bar.type-restore .bp-fill {
                background: linear-gradient(90deg, #083344, #06b6d4, #67e8f9);
                box-shadow: 0 0 10px rgba(6, 182, 212, 0.6);
            }

            .bp-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 10px;
            }
            .bp-title {
                font-size: 0.82rem;
                font-weight: 600;
                letter-spacing: 0.04em;
                text-transform: uppercase;
            }
            .bp-percent {
                font-family: var(--font-mono, monospace);
                font-size: 0.85rem;
                font-weight: 700;
            }
            .bp-track {
                width: 100%;
                height: 8px;
                background: rgba(255, 255, 255, 0.06);
                border-radius: 999px;
                overflow: hidden;
            }
            .bp-fill {
                height: 100%;
                border-radius: 999px;
                width: 0%;
                transition: width 0.8s ease;
            }
            .bp-info {
                margin-top: 7px;
                font-size: 0.75rem;
                color: #6b7280;
                display: flex;
                justify-content: space-between;
            }

            /* SFTP Info Slider styles */
            .sftp-info-container {
                margin-top: 1.5rem;
                border: 1px solid var(--glass-border);
                border-radius: 12px;
                background: rgba(10, 8, 22, 0.4);
                overflow: hidden;
                transition: all 0.3s ease;
            }

            .sftp-toggle-btn {
                width: 100%;
                padding: 1rem 1.5rem;
                background: transparent;
                border: none;
                color: white;
                font-size: 0.95rem;
                font-weight: 600;
                display: flex;
                justify-content: space-between;
                align-items: center;
                cursor: pointer;
                transition: background 0.2s;
            }

            .sftp-toggle-btn:hover {
                background: rgba(255, 255, 255, 0.03);
            }

            .chevron-icon {
                width: 24px;
                height: 24px;
                fill: var(--text-muted);
                transition: transform 0.3s ease;
            }

            .chevron-icon.open {
                transform: rotate(180deg);
            }

            .sftp-content {
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s cubic-bezier(0, 1, 0, 1);
                background: rgba(0, 0, 0, 0.2);
            }

            .sftp-content.open {
                max-height: 500px;
                transition: max-height 0.3s cubic-bezier(0.85, 0, 0.15, 1);
            }

            .sftp-grid {
                padding: 1.25rem 1.5rem;
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 1.5rem;
            }

            .sftp-field {
                display: flex;
                flex-direction: column;
                gap: 0.35rem;
            }

            .sftp-field label {
                font-size: 0.75rem;
                font-weight: 600;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .sftp-field span {
                font-family: var(--font-mono, monospace);
                font-size: 0.9rem;
                color: white;
                background: rgba(255, 255, 255, 0.04);
                padding: 0.5rem 0.75rem;
                border-radius: 6px;
                border: 1px solid var(--glass-border);
                display: inline-block;
            }

            .password-field {
                cursor: pointer;
                transition: border-color 0.2s, background 0.2s;
            }

            .password-field:hover {
                background: rgba(6, 182, 212, 0.1);
                border-color: rgba(6, 182, 212, 0.3);
            }

            .password-field small {
                color: var(--accent-secondary);
                margin-left: 0.5rem;
                font-size: 0.7rem;
                text-transform: none;
            }
        </style>
    </head>
    <body>

        <!-- Floating Operation Progress Bar -->
        <div id="operation-progress-bar">
            <div class="bp-header">
                <span class="bp-title" id="bp-title-text">⚙ Working...</span>
                <span class="bp-percent" id="bp-percent-text">0%</span>
            </div>
            <div class="bp-track">
                <div class="bp-fill" id="bp-fill"></div>
            </div>
            <div class="bp-info">
                <span id="bp-label"></span>
                <span id="bp-elapsed"></span>
            </div>
        </div>

        <!-- Login Container -->
        <div id="login-wrapper">
            <div class="rgb-border-wrapper">
                <div id="login-container">
                    <h1><span class="lime-text">Minecraft</span> Control Panel</h1>
                    <p>Enter administrative credentials to log in.</p>
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="e.g. admin">
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••">
                    </div>
                    <button class="btn" onclick="login()">Sign In</button>
                </div>
            </div>
        </div>

        <!-- Ambient background blobs -->
        <div class="bg-glow-container">
            <div class="bg-glow-1"></div>
            <div class="bg-glow-2"></div>
            <div class="bg-glow-3"></div>
        </div>

        <!-- Dashboard Container wrapped in RGB border -->
        <div class="dashboard-rgb-wrapper" id="dashboard-rgb-wrapper" style="display:none; width:95vw; max-width:1400px; height:90vh;">
            <div id="dashboard-container">
            <aside>
                <div>
                    <div class="brand">
                        <svg viewBox="0 0 24 24">
                            <path d="M4 2h16a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm0 2v4h4V4H4zm6 0v4h4V4h-4zm6 0v4h4V4h-4zM4 10v4h4v-4H4zm6 0v4h4v-4h-4zm6 0v4h4v-4h-4zM4 16v4h4v-4H4zm6 0v4h4v-4h-4zm6 0v4h4v-4h-4z"/>
                        </svg>
                        <h2>NeuroXYZ Panel</h2>
                    </div>
                    <ul class="nav-menu">
                        <li class="nav-item active" onclick="switchView('console', this)">
                            <svg style="width: 18px; height: 18px; fill: currentColor; margin-right: 0.5rem;" viewBox="0 0 24 24">
                                <path d="M20 19H4c-1.1 0-2-.9-2-2V7c0-1.1.9-2 2-2h16c1.1 0 2 .9 2 2v10c0 1.1-.9 2-2 2zM4 7v10h16V7H4zm3 2h2v2H7V9zm0 4h6v2H7v-2zm8-4h2v2h-2V9z"/>
                            </svg>
                            Console
                        </li>
                        <li class="nav-item" onclick="switchView('files', this)">
                            <svg style="width: 18px; height: 18px; fill: currentColor; margin-right: 0.5rem;" viewBox="0 0 24 24">
                                <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
                            </svg>
                            File Manager
                        </li>
                        <li class="nav-item" onclick="switchView('backups', this)">
                            <svg style="width: 18px; height: 18px; fill: currentColor; margin-right: 0.5rem;" viewBox="0 0 24 24">
                                <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
                            </svg>
                            Backups
                        </li>
                    </ul>
                </div>
                <div class="nav-item logout-btn" onclick="logout()">
                    <svg style="width: 18px; height: 18px; fill: currentColor; margin-right: 0.5rem;" viewBox="0 0 24 24">
                        <path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/>
                    </svg>
                    Logout
                </div>
            </aside>

            <main>
                <header>
                    <div class="server-info">
                        <h2 style="font-weight: 600;">Minecraft Server</h2>
                        <div id="status-badge" class="status-badge">
                            <div class="status-dot"></div>
                            <span id="status-text">Checking...</span>
                        </div>
                    </div>
                    <div class="stats-row">
                        <div class="stat-box">
                            Players: <span id="players-stat">0/20</span>
                        </div>
                        <div class="stat-box">
                            RAM: <span id="ram-text">0 GB</span>
                            <div class="stat-bar"><div id="ram-progress" class="stat-progress"></div></div>
                        </div>
                        <div class="control-buttons">
                            <button id="power-btn" class="btn start-btn" onclick="togglePower()">Start</button>
                            <button id="restart-btn" class="btn restart-btn" onclick="restartServer()">Restart</button>
                        </div>
                    </div>
                </header>

                <!-- Console View -->
                <div id="view-console" class="view active">
                    <div id="terminal"></div>
                    <div class="console-input-wrapper">
                        <input type="text" id="console-cmd" placeholder="Type a minecraft command (e.g. op name, whitelist add name)..." onkeydown="if(event.key==='Enter') sendCommand()">
                        <button class="btn console-send" onclick="sendCommand()">Send</button>
                    </div>
                </div>

                <!-- Files View -->
                <div id="view-files" class="view">
                    <div class="file-actions">
                        <div class="breadcrumbs" id="breadcrumbs">
                            <span onclick="loadDir('')">Root</span>
                        </div>
                        <div class="file-buttons">
                            <button onclick="newFolder()">+ New Folder</button>
                            <button onclick="newFile()">+ New File</button>
                            <label for="file-upload">
                                ↑ Upload File
                                <input type="file" id="file-upload" style="display:none;" onchange="handleFileUpload(this.files)">
                            </label>
                            <button style="background: linear-gradient(135deg, #22c55e, #16a34a) !important; color: white;" onclick="downloadCurrentFolder()">
                                ↓ Download Folder (.zip)
                            </button>
                        </div>
                    </div>
                    <div class="files-grid-wrapper" id="files-drop-zone">
                        <div class="drag-overlay" id="drag-overlay">Drop files here to upload!</div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Size</th>
                                    <th>Last Modified</th>
                                    <th style="width: 100px;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="files-list"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Backups View -->
                <div id="view-backups" class="view">
                    <div class="file-actions">
                        <div class="breadcrumbs">
                            <span style="font-weight:600; color:white;">Server Backups / Releases</span>
                        </div>
                        <div class="file-buttons">
                            <input type="text" id="backup-label" placeholder="Release note (e.g. Before Mekanism)..." style="padding: 0.5rem 1rem; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border); border-radius: 6px; color: white; outline: none; font-size: 0.85rem; width: 250px;">
                            <button id="btn-create-backup" onclick="createBackup()">Create Backup</button>
                            <label for="backup-upload">
                                ↑ Import (.zip)
                                <input type="file" id="backup-upload" accept=".zip" style="display:none;" onchange="handleBackupUpload(this.files)">
                            </label>
                        </div>
                    </div>
                    <div class="files-grid-wrapper" id="backups-drop-zone">
                        <div class="drag-overlay" id="backups-drag-overlay">Drop backup .zip here to import!</div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Date / Time</th>
                                    <th>Release / Note</th>
                                    <th>Size</th>
                                    <th style="width: 150px; text-align: center;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="backups-list"></tbody>
                        </table>
                    </div>

                    <!-- SFTP Info Section -->
                    <div class="sftp-info-container">
                        <button class="sftp-toggle-btn" onclick="toggleSftpInfo()">
                            <span>🔑 SFTP Connection Info</span>
                            <svg class="chevron-icon" id="sftp-chevron" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
                        </button>
                        <div class="sftp-content" id="sftp-content-wrapper">
                            <div class="sftp-grid">
                                <div class="sftp-field">
                                    <label>Host</label>
                                    <span>minecraft.rainbowtechnology.xyz</span>
                                </div>
                                <div class="sftp-field">
                                    <label>Port</label>
                                    <span>2222</span>
                                </div>
                                <div class="sftp-field">
                                    <label>Username</label>
                                    <span>admin</span>
                                </div>
                                <div class="sftp-field">
                                    <label>Password</label>
                                    <span class="password-field" onclick="copyText('minecraft')">minecraft <small>(click to copy)</small></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                </div>
            </main>
        </div>
        </div>

        <!-- Editor Modal -->
        <div id="editor-modal">
            <div class="editor-container">
                <div class="editor-header">
                    <h3 id="editor-filename">Editing File</h3>
                </div>
                <div class="editor-body">
                    <textarea id="editor-textarea" spellcheck="false"></textarea>
                </div>
                <div class="editor-footer">
                    <button class="cancel-btn" onclick="closeEditor()">Cancel</button>
                    <button class="save-btn" onclick="saveFile()">Save Changes</button>
                </div>
            </div>
        </div>

        <script>
            let currentPath = '';
            let editingFilePath = '';
            let sseSource = null;
            let currentStatus = 'offline';

            // Check session on page load
            window.onload = () => {
                if (document.cookie.includes('panel_session=')) {
                    showDashboard();
                }
            };

            function showDashboard() { 
                document.getElementById('login-wrapper').style.display = 'none';
                document.getElementById('dashboard-rgb-wrapper').style.display = 'block';
                document.getElementById('dashboard-container').style.display = 'grid';
                startStatusPolling();
                startLogStream();
                loadDir('');
                setupBackupsDragAndDrop();
                // Auto-detect any backup or restore already running on the server
                startProgressPolling();
            }

            async function login() {
                const u = document.getElementById('username').value;
                const p = document.getElementById('password').value;
                try {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: u, password: p })
                    });
                    const data = await res.json();
                    if (data.success) {
                        showDashboard();
                    } else {
                        alert('Error: ' + (data.error || 'Authentication failed'));
                    }
                } catch (e) {
                    alert('Login request failed');
                }
            }

            async function logout() {
                await fetch('/api/logout');
                document.cookie = "panel_session=; Path=/; Max-Age=0;";
                location.reload();
            }

            // Dashboard View Switcher
            function switchView(viewId, element) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                
                document.getElementById('view-' + viewId).classList.add('active');
                element.classList.add('active');

                if (viewId === 'backups') {
                    loadBackups();
                }
            }

            // Backups management logic
            let backupInProgress = false;
            let restoreInProgress = false;

            async function loadBackups() {
                try {
                    const res = await fetch('/api/backups');
                    const data = await res.json();
                    if (!data.success) {
                        console.error('Failed to load backups:', data.error);
                        return;
                    }
                    
                    backupInProgress = data.backupInProgress;
                    restoreInProgress = data.restoreInProgress;
                    
                    const btnCreate = document.getElementById('btn-create-backup');
                    if (backupInProgress) {
                        btnCreate.innerText = 'Creating Backup...';
                        btnCreate.disabled = true;
                    } else {
                        btnCreate.innerText = 'Create Backup';
                        btnCreate.disabled = false;
                    }
                    
                    const listContainer = document.getElementById('backups-list');
                    listContainer.innerHTML = '';
                    
                    if (data.backups.length === 0) {
                        listContainer.innerHTML = `
                            <tr>
                                <td colspan="4" style="text-align: center; color: var(--text-muted); padding: 2rem;">
                                    No backups found. Create one above!
                                </td>
                            </tr>
                        `;
                        return;
                    }
                    
                    data.backups.forEach(backup => {
                        const row = document.createElement('tr');
                        const sizeMB = (backup.size / (1024 * 1024)).toFixed(1);
                        
                        row.innerHTML = `
                            <td>${backup.date}</td>
                            <td style="color: white; font-weight: 500;">${backup.label || '<em style="color: var(--text-muted)">No description</em>'}</td>
                            <td>${sizeMB} MB</td>
                            <td style="text-align: center;">
                                <div class="actions-cell" style="justify-content: center;">
                                    <button class="action-icon" title="Download" onclick="downloadBackup('${backup.filename}')">
                                        <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
                                    </button>
                                    <button class="action-icon" title="Restore" onclick="restoreBackup('${backup.filename}')" style="color: var(--accent-secondary);">
                                        <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.95 20 14.53 20 13c0-4.42-3.58-8-8-8zm-1.46 10.1c-.26-.8-.4-1.65-.4-2.5h-2c0 1.28.32 2.47.88 3.52l1.52-1.02zM12 17c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 6.74C4.46 8.05 4 9.53 4 11c0 4.42 3.58 8 8 8v4l5-5-5-5v3z"/></svg>
                                    </button>
                                    <button class="action-icon delete-btn" title="Delete" onclick="deleteBackup('${backup.filename}')">
                                        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                                    </button>
                                </div>
                            </td>
                        `;
                        listContainer.appendChild(row);
                    });
                } catch (e) {
                    console.error('Failed to fetch backups:', e);
                }
            }

            // General operation progress polling (Backup & Restore) — driven by server state, survives page navigation
            let progressPollInterval = null;

            function startProgressPolling() { 
                if (progressPollInterval) return; // already polling
                progressPollInterval = setInterval(async () => {
                    try {
                        const res = await fetch('/api/backups/status');
                        const data = await res.json();

                        const bar = document.getElementById('operation-progress-bar');
                        const title = document.getElementById('bp-title-text');
                        const fill = document.getElementById('bp-fill');
                        const pct = document.getElementById('bp-percent-text');
                        const lbl = document.getElementById('bp-label');
                        const elapsed = document.getElementById('bp-elapsed');

                        if (data.active) {
                            bar.style.display = 'block';
                            bar.className = 'type-' + data.type; // 'type-backup' or 'type-restore'
                            
                            if (data.type === 'backup') {
                                title.textContent = '⚙ Creating Backup...';
                                lbl.textContent = data.label ? '📦 ' + data.label : '';
                                backupInProgress = true;
                                restoreInProgress = false;
                            } else if (data.type === 'restore') {
                                title.textContent = '🔄 Restoring Backup...';
                                lbl.textContent = '⚠️ Overwriting server files';
                                backupInProgress = false;
                                restoreInProgress = true;
                            }

                            fill.style.width = data.percent + '%';
                            pct.textContent = data.percent + '%';
                            
                            const mins = Math.floor(data.elapsed / 60);
                            const secs = data.elapsed % 60;
                            elapsed.textContent = `⏱ ${mins}m ${secs}s`;

                            // Keep button blocked
                            const btnCreate = document.getElementById('btn-create-backup');
                            if (btnCreate) {
                                btnCreate.innerText = data.type === 'backup' ? 'Creating Backup...' : 'Restoring in progress...';
                                btnCreate.disabled = true;
                            }
                        } else {
                            // Finished
                            bar.style.display = 'none';
                            clearInterval(progressPollInterval);
                            progressPollInterval = null;
                            backupInProgress = false;
                            restoreInProgress = false;
                            const btnCreate = document.getElementById('btn-create-backup');
                            if (btnCreate) { btnCreate.innerText = 'Create Backup'; btnCreate.disabled = false; }
                            loadBackups();
                        }
                    } catch (e) {
                        // silently ignore network errors during polling
                    }
                }, 1500);
            }

            async function createBackup() {
                if (backupInProgress || restoreInProgress) return;
                const labelInput = document.getElementById('backup-label');
                const label = labelInput.value.trim();
                
                try {
                    const btnCreate = document.getElementById('btn-create-backup');
                    btnCreate.innerText = 'Starting...';
                    btnCreate.disabled = true;
                    
                    const res = await fetch('/api/backups/create', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ label })
                    });
                    const data = await res.json();
                    if (data.success) {
                        labelInput.value = '';
                        backupInProgress = true;
                        startProgressPolling();
                    } else {
                        alert('Error creating backup: ' + data.error);
                        btnCreate.innerText = 'Create Backup';
                        btnCreate.disabled = false;
                    }
                } catch (e) {
                    alert('Backup request failed');
                    const btnCreate = document.getElementById('btn-create-backup');
                    if (btnCreate) { btnCreate.innerText = 'Create Backup'; btnCreate.disabled = false; }
                }
            }


            function downloadBackup(filename) {
                window.location.href = `/api/backups/download?path=${encodeURIComponent(filename)}`;
            }

            async function deleteBackup(filename) {
                if (!confirm(`Are you sure you want to permanently delete backup "${filename}"?\nThis action cannot be undone.`)) {
                    return;
                }
                if (!confirm(`Double Confirmation: Please confirm once more to delete "${filename}".`)) {
                    return;
                }
                
                try {
                    const res = await fetch('/api/backups/delete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ filename })
                    });
                    const data = await res.json();
                    if (data.success) {
                        loadBackups();
                    } else {
                        alert('Error deleting backup: ' + data.error);
                    }
                } catch (e) {
                    alert('Delete request failed');
                }
            }

            async function restoreBackup(filename) {
                const typedConfirm = prompt(`WARNING: Restoring will overwrite the current world and server files!\nYour server will be restarted.\n\nType "RESTAURAR" to confirm:`);
                if (typedConfirm !== 'RESTAURAR') {
                    alert('Restoration cancelled.');
                    return;
                }
                
                try {
                    const res = await fetch('/api/backups/restore', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ filename })
                    });
                    const data = await res.json();
                    if (data.success) {
                        restoreInProgress = true;
                        startProgressPolling();
                        // Do not block navigation, show progress and switch to console view to see the restart logs
                        switchView('console', document.querySelector('.nav-menu .nav-item'));
                    } else {
                        alert('Error starting restoration: ' + data.error);
                    }
                } catch (e) {
                    alert('Restore request failed');
                }
            }

            function setupBackupsDragAndDrop() {
                const zone = document.getElementById('backups-drop-zone');
                const overlay = document.getElementById('backups-drag-overlay');
                
                window.addEventListener('dragenter', (e) => {
                    const backupsActive = document.getElementById('view-backups').classList.contains('active');
                    if (backupsActive) {
                        overlay.style.display = 'flex';
                    }
                });
                
                overlay.addEventListener('dragleave', (e) => {
                    const rect = zone.getBoundingClientRect();
                    const x = e.clientX;
                    const y = e.clientY;
                    if (x < rect.left || x >= rect.right || y < rect.top || y >= rect.bottom) {
                        overlay.style.display = 'none';
                    }
                });
                
                overlay.addEventListener('dragover', (e) => {
                    e.preventDefault();
                });
                
                overlay.addEventListener('drop', (e) => {
                    e.preventDefault();
                    overlay.style.display = 'none';
                    
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        handleBackupUpload(files);
                    }
                });
            }

            async function handleBackupUpload(files) {
                const file = files[0];
                if (!file.name.endsWith('.zip')) {
                    alert('Only .zip backup files are supported.');
                    return;
                }
                
                const btnCreate = document.getElementById('btn-create-backup');
                const originalText = btnCreate.innerText;
                btnCreate.disabled = true;
                
                try {
                    btnCreate.innerText = 'Uploading: 0%';
                    
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', `/api/upload?path=${encodeURIComponent('backups/' + file.name)}`);
                    
                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            const percent = Math.round((e.loaded / e.total) * 100);
                            btnCreate.innerText = `Uploading: ${percent}%`;
                        }
                    };
                    
                    xhr.onload = () => {
                        btnCreate.disabled = false;
                        btnCreate.innerText = originalText;
                        
                        if (xhr.status === 200) {
                            loadBackups();
                        } else {
                            alert('Upload failed: ' + xhr.responseText);
                        }
                    };
                    
                    xhr.onerror = () => {
                        btnCreate.disabled = false;
                        btnCreate.innerText = originalText;
                        alert('Upload network error');
                    };
                    
                    xhr.send(file);
                } catch (e) {
                    btnCreate.disabled = false;
                    btnCreate.innerText = originalText;
                    alert('Upload setup failed');
                }
            }

            // Status Polling
            function startStatusPolling() {
                updateStatus();
                setInterval(updateStatus, 5000);
            }

            async function updateStatus() {
                try {
                    const res = await fetch('/api/status');
                    if (res.status === 401) return logout();
                    const data = await res.json();
                    
                    const badge = document.getElementById('status-badge');
                    const text = document.getElementById('status-text');
                    const powerBtn = document.getElementById('power-btn');
                    const restartBtn = document.getElementById('restart-btn');
                    
                    currentStatus = data.status;

                    if (data.status === 'online') {
                        badge.className = 'status-badge online';
                        text.innerText = 'Online';
                        
                        powerBtn.className = 'btn stop-btn';
                        powerBtn.innerText = 'Stop';
                        powerBtn.disabled = false;
                        restartBtn.disabled = false;
                    } else if (data.status === 'starting') {
                        badge.className = 'status-badge starting';
                        text.innerText = 'Starting...';
                        
                        powerBtn.className = 'btn stop-btn';
                        powerBtn.innerText = 'Stop';
                        powerBtn.disabled = false;
                        restartBtn.disabled = true;
                    } else {
                        badge.className = 'status-badge';
                        text.innerText = 'Offline';
                        
                        powerBtn.className = 'btn start-btn';
                        powerBtn.innerText = 'Start';
                        powerBtn.disabled = false;
                        restartBtn.disabled = true;
                    }

                    document.getElementById('players-stat').innerText = `${data.players.online}/${data.players.max}`;
                    
                    const usedGB = (data.memory.used / (1024 * 1024 * 1024)).toFixed(1);
                    const totalGB = (data.memory.total / (1024 * 1024 * 1024)).toFixed(1);
                    document.getElementById('ram-text').innerText = `${usedGB} / ${totalGB} GB`;
                    document.getElementById('ram-progress').style.width = `${data.memory.percent}%`;
                } catch (e) {
                    const badge = document.getElementById('status-badge');
                    const text = document.getElementById('status-text');
                    badge.className = 'status-badge';
                    text.innerText = 'Connection Error';
                }
            }

            async function togglePower() {
                const powerBtn = document.getElementById('power-btn');
                powerBtn.disabled = true;
                
                const action = (currentStatus === 'online' || currentStatus === 'starting') ? 'stop' : 'start';
                const confirmMsg = action === 'stop' 
                    ? 'Are you sure you want to STOP the Minecraft server?'
                    : 'Are you sure you want to START the Minecraft server?';
                    
                if (!confirm(confirmMsg)) {
                    powerBtn.disabled = false;
                    return;
                }
                
                try {
                    const res = await fetch(`/api/${action}`, { method: 'POST' });
                    const data = await res.json();
                    if (data.success) {
                        setTimeout(updateStatus, 1000);
                    } else {
                        alert('Power action failed: ' + (data.error || 'Unknown error'));
                        powerBtn.disabled = false;
                    }
                } catch (e) {
                    alert('Request failed');
                    powerBtn.disabled = false;
                }
            }

            // Log Streaming (SSE)
            function startLogStream() {
                if (sseSource) sseSource.close();
                const term = document.getElementById('terminal');
                term.innerHTML = '<div class="log-line info">Connecting to server log stream...</div>';

                sseSource = new EventSource('/api/logs');
                sseSource.onmessage = (event) => {
                    const logData = JSON.parse(event.data);
                    const lines = logData.split('\n');
                    lines.forEach(line => {
                        if (!line.trim()) return;
                        const lineDiv = document.createElement('div');
                        lineDiv.className = 'log-line';
                        
                        if (line.includes('[Server thread/WARN]') || line.includes('WARN')) {
                            lineDiv.classList.add('warn');
                        } else if (line.includes('[Server thread/ERROR]') || line.includes('ERROR')) {
                            lineDiv.classList.add('error');
                        } else {
                            lineDiv.classList.add('info');
                        }

                        lineDiv.innerText = line;
                        term.appendChild(lineDiv);
                    });
                    term.scrollTop = term.scrollHeight;
                };

                sseSource.onerror = () => {
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'log-line error';
                    lineDiv.innerText = '[System] Log stream disconnected. Retrying...';
                    term.appendChild(lineDiv);
                    term.scrollTop = term.scrollHeight;
                };
            }

            async function sendCommand() {
                const input = document.getElementById('console-cmd');
                const cmd = input.value.trim();
                if (!cmd) return;
                input.value = '';

                const term = document.getElementById('terminal');
                const echoDiv = document.createElement('div');
                echoDiv.className = 'log-line';
                echoDiv.style.color = '#38bdf8';
                echoDiv.innerText = '> ' + cmd;
                term.appendChild(echoDiv);
                term.scrollTop = term.scrollHeight;

                try {
                    const res = await fetch('/api/console', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ command: cmd })
                    });
                    const data = await res.json();
                    if (data.response) {
                        const respDiv = document.createElement('div');
                        respDiv.className = 'log-line';
                        respDiv.style.color = '#34d399';
                        respDiv.innerText = data.response;
                        term.appendChild(respDiv);
                    } else if (data.error) {
                        const errDiv = document.createElement('div');
                        errDiv.className = 'log-line error';
                        errDiv.innerText = 'RCON Error: ' + data.error;
                        term.appendChild(errDiv);
                    }
                    term.scrollTop = term.scrollHeight;
                } catch (e) {
                    const errDiv = document.createElement('div');
                    errDiv.className = 'log-line error';
                    errDiv.innerText = 'Failed to communicate with RCON.';
                    term.appendChild(errDiv);
                    term.scrollTop = term.scrollHeight;
                }
            }

            async function restartServer() {
                if (!confirm('Are you sure you want to RESTART the Minecraft server?')) return;
                const restartBtn = document.getElementById('restart-btn');
                restartBtn.disabled = true;
                try {
                    const res = await fetch('/api/restart', { method: 'POST' });
                    const data = await res.json();
                    if (data.success) {
                        setTimeout(updateStatus, 1500);
                    } else {
                        alert('Restart failed');
                        restartBtn.disabled = false;
                    }
                } catch (e) {
                    alert('Failed to send restart command');
                    restartBtn.disabled = false;
                }
            }

            // File Manager Actions
            async function loadDir(pathStr) {
                currentPath = pathStr;
                updateBreadcrumbs();
                const list = document.getElementById('files-list');
                list.innerHTML = '<tr><td colspan="4" style="text-align:center;">Loading directory files...</td></tr>';
                
                try {
                    const res = await fetch('/api/files?path=' + encodeURIComponent(pathStr));
                    const data = await res.json();
                    if (!data.success) {
                        list.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#f87171;">Error: ${data.error}</td></tr>`;
                        return;
                    }

                    list.innerHTML = '';
                    
                    if (currentPath !== '') {
                        const parentPath = currentPath.substring(0, currentPath.lastIndexOf('/')) || '';
                        const tr = document.createElement('tr');
                        tr.onclick = () => loadDir(parentPath);
                        tr.innerHTML = `
                            <td>
                                <div class="file-name-cell">
                                    <svg class="file-icon folder-icon" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                                    <span>..</span>
                                </div>
                            </td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                        `;
                        list.appendChild(tr);
                    }

                    if (data.files.length === 0 && currentPath === '') {
                        list.innerHTML = '<tr><td colspan="4" style="text-align:center;">Directory is empty.</td></tr>';
                        return;
                    }

                    data.files.forEach(file => {
                        const tr = document.createElement('tr');
                        const fullFilePath = currentPath ? `${currentPath}/${file.name}` : file.name;
                        
                        if (file.isDir) {
                            tr.onclick = () => loadDir(fullFilePath);
                        } else {
                            tr.onclick = () => openFile(fullFilePath);
                        }

                        const dateStr = file.mtime ? new Date(file.mtime).toLocaleString() : '-';
                        const sizeStr = file.isDir ? '-' : formatBytes(file.size);
                        
                        tr.innerHTML = `
                            <td>
                                <div class="file-name-cell">
                                    ${file.isDir 
                                        ? `<svg class="file-icon folder-icon" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>`
                                        : `<svg class="file-icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>`
                                    }
                                    <span>${file.name}</span>
                                </div>
                            </td>
                            <td>${sizeStr}</td>
                            <td>${dateStr}</td>
                            <td onclick="event.stopPropagation()">
                                <div class="actions-cell">
                                    <button class="action-icon delete-btn" title="Delete" onclick="deleteItem('${fullFilePath}', ${file.isDir})">
                                        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                                    </button>
                                    ${!file.isDir ? `
                                    <button class="action-icon" title="Download File" onclick="downloadFile('${fullFilePath}')">
                                        <svg viewBox="0 0 24 24" style="fill: #a3e635;"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
                                    </button>` : `
                                    <button class="action-icon" title="Download Folder as ZIP" onclick="downloadFolder('${fullFilePath}')">
                                        <svg viewBox="0 0 24 24" style="fill: #a3e635;"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
                                    </button>`}
                                </div>
                            </td>
                        `;
                        list.appendChild(tr);
                    });
                } catch (e) {
                    list.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#f87171;">Request error loading directory</td></tr>`;
                }
            }

            function downloadCurrentFolder() {
                window.location.href = `/api/download-folder?path=${encodeURIComponent(currentPath)}`;
            }

            function downloadFolder(pathStr) {
                window.location.href = `/api/download-folder?path=${encodeURIComponent(pathStr)}`;
            }

            function updateBreadcrumbs() {
                const bc = document.getElementById('breadcrumbs');
                bc.innerHTML = '<span onclick="loadDir(\'\')">Root</span>';
                if (!currentPath) return;

                const parts = currentPath.split('/');
                let cumulative = '';
                parts.forEach(part => {
                    cumulative = cumulative ? `${cumulative}/${part}` : part;
                    const pathVal = cumulative;
                    bc.innerHTML += ` &gt; <span onclick="loadDir('${pathVal}')">${part}</span>`;
                });
            }

            function formatBytes(bytes, decimals = 2) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const dm = decimals < 0 ? 0 : decimals;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
            }

            // Create operations
            async function newFolder() {
                const name = prompt('Enter new folder name:');
                if (!name) return;
                const pathStr = currentPath ? `${currentPath}/${name}` : name;
                try {
                    const res = await fetch('/api/mkdir', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path: pathStr })
                    });
                    const data = await res.json();
                    if (data.success) {
                        loadDir(currentPath);
                    } else {
                        alert('Error: ' + data.error);
                    }
                } catch (e) {
                    alert('Request failed');
                }
            }

            async function newFile() {
                const name = prompt('Enter new file name:');
                if (!name) return;
                const pathStr = currentPath ? `${currentPath}/${name}` : name;
                try {
                    const res = await fetch('/api/save', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path: pathStr, content: '' })
                    });
                    const data = await res.json();
                    if (data.success) {
                        loadDir(currentPath);
                        openFile(pathStr);
                    } else {
                        alert('Error: ' + data.error);
                    }
                } catch (e) {
                    alert('Request failed');
                }
            }

            async function deleteItem(pathStr, isDir) {
                if (!confirm(`Are you sure you want to delete this ${isDir ? 'folder' : 'file'}?\n${pathStr}`)) return;
                try {
                    const res = await fetch('/api/delete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path: pathStr })
                    });
                    const data = await res.json();
                    if (data.success) {
                        loadDir(currentPath);
                    } else {
                        alert('Error: ' + data.error);
                    }
                } catch (e) {
                    alert('Request failed');
                }
            }

            function downloadFile(pathStr) {
                window.open('/api/file?path=' + encodeURIComponent(pathStr), '_blank');
            }

            // Editor Actions
            async function openFile(pathStr) {
                editingFilePath = pathStr;
                document.getElementById('editor-filename').innerText = `Editing: ${pathStr.split('/').pop()}`;
                const textarea = document.getElementById('editor-textarea');
                textarea.value = 'Loading file contents...';
                document.getElementById('editor-modal').style.display = 'flex';

                try {
                    const res = await fetch('/api/file?path=' + encodeURIComponent(pathStr));
                    if (res.status === 200) {
                        textarea.value = await res.text();
                    } else {
                        textarea.value = 'Failed to load file contents.';
                    }
                } catch (e) {
                    textarea.value = 'Network error fetching file content.';
                }
            }

            function closeEditor() {
                document.getElementById('editor-modal').style.display = 'none';
                editingFilePath = '';
            }

            async function saveFile() {
                const content = document.getElementById('editor-textarea').value;
                try {
                    const res = await fetch('/api/save', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path: editingFilePath, content })
                    });
                    const data = await res.json();
                    if (data.success) {
                        closeEditor();
                        loadDir(currentPath);
                    } else {
                        alert('Error saving file: ' + data.error);
                    }
                } catch (e) {
                    alert('Failed to save file.');
                }
            }

            // Upload files
            async function handleFileUpload(files) {
                if (files.length === 0) return;
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const pathStr = currentPath ? `${currentPath}/${file.name}` : file.name;
                    try {
                        await fetch('/api/upload?path=' + encodeURIComponent(pathStr), {
                            method: 'POST',
                            body: file
                        });
                    } catch (e) {
                        alert(`Failed to upload ${file.name}`);
                    }
                }
                loadDir(currentPath);
            }

            // Drag and Drop
            const dropZone = document.getElementById('files-drop-zone');
            const dragOverlay = document.getElementById('drag-overlay');

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dragOverlay.style.display = 'flex';
            });

            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dragOverlay.style.display = 'none';
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dragOverlay.style.display = 'none';
                handleFileUpload(e.dataTransfer.files);
            });

            function toggleSftpInfo() {
                const wrapper = document.getElementById('sftp-content-wrapper');
                const chevron = document.getElementById('sftp-chevron');
                wrapper.classList.toggle('open');
                chevron.classList.toggle('open');
            }

            function copyText(text) {
                navigator.clipboard.writeText(text).then(() => {
                    alert('Copied to clipboard!');
                }).catch(err => {
                    console.error('Failed to copy: ', err);
                });
            }
        </script>
    </body>
    </html>

