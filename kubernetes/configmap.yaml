apiVersion: v1
data:
  index.html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n
    \   <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n
    \   <title>Minecraft Server Control Panel</title>\n    <link href=\"https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap\"
    rel=\"stylesheet\">\n    <style>\n        :root {\n            --bg-main: #09090b;\n
    \           --accent-primary: #a855f7;\n            --accent-secondary: #06b6d4;\n
    \           --accent-lime: #84cc16;\n            --accent-pink: #d946ef;\n            --glass-bg:
    rgba(10, 10, 12, 0.90);\n            --glass-border: rgba(255, 255, 255, 0.06);\n
    \           --text-main: #f4f4f5;\n            --text-muted: #a1a1aa;\n            --font-display:
    'Space Grotesk', sans-serif;\n            --font-mono: 'JetBrains Mono', 'Fira
    Code', monospace;\n        }\n\n        * {\n            box-sizing: border-box;\n
    \           margin: 0;\n            padding: 0;\n            font-family: 'Inter',
    'Comfortaa', sans-serif;\n        }\n\n        body {\n            background-color:
    var(--bg-main);\n            background-image:\n                linear-gradient(rgba(255,
    255, 255, 0.03) 1px, transparent 1px),\n                linear-gradient(90deg,
    rgba(255, 255, 255, 0.03) 1px, transparent 1px);\n            background-size:
    40px 40px;\n            color: var(--text-main);\n            min-height: 100vh;\n
    \           display: flex;\n            align-items: center;\n            justify-content:
    center;\n            overflow-x: hidden;\n            position: relative;\n        }\n\n
    \       /* Ambient Glow Blobs */\n        .bg-glow-container {\n            position:
    fixed;\n            inset: 0;\n            opacity: 0.3;\n            pointer-events:
    none;\n            z-index: 0;\n            overflow: hidden;\n        }\n        .bg-glow-1
    {\n            position: absolute;\n            top: 10%;\n            left: 5%;\n
    \           width: 45vw; height: 45vw;\n            border-radius: 50%;\n            background:
    radial-gradient(circle, var(--accent-lime) 0%, transparent 65%);\n            filter:
    blur(100px);\n        }\n        .bg-glow-2 {\n            position: absolute;\n
    \           bottom: 5%;\n            right: 5%;\n            width: 50vw; height:
    50vw;\n            border-radius: 50%;\n            background: radial-gradient(circle,
    var(--accent-primary) 0%, transparent 65%);\n            filter: blur(100px);\n
    \       }\n        .bg-glow-3 {\n            position: absolute;\n            top:
    50%;\n            left: 55%;\n            width: 40vw; height: 40vw;\n            border-radius:
    50%;\n            background: radial-gradient(circle, var(--accent-secondary)
    0%, transparent 65%);\n            filter: blur(120px);\n        }\n\n        /*
    RGB Border Animation for Dashboard */\n        @keyframes rotate-conic {\n            from
    { transform: rotate(0deg); }\n            to { transform: rotate(360deg); }\n
    \       }\n\n        .dashboard-rgb-wrapper {\n            position: relative;\n
    \           overflow: hidden;\n            border-radius: 22px;\n            padding:
    2px;\n            width: 100%;\n            height: 100vh;\n            z-index:
    1;\n            box-shadow: 0 0 60px -15px rgba(132, 204, 22, 0.15);\n        }\n
    \       .dashboard-rgb-wrapper::before {\n            content: '';\n            position:
    absolute;\n            top: -50%; left: -50%;\n            width: 200%; height:
    200%;\n            background: conic-gradient(\n                from 0deg,\n                var(--accent-lime),\n
    \               var(--accent-primary),\n                var(--accent-pink),\n
    \               var(--accent-secondary),\n                var(--accent-lime)\n
    \           );\n            animation: rotate-conic 12s linear infinite;\n            z-index:
    0;\n            opacity: 0.8;\n        }\n\n        /* Floating Cyan Scrollbar
    */\n        ::-webkit-scrollbar {\n            width: 12px;\n            height:
    12px;\n        }\n        ::-webkit-scrollbar-track {\n            background:
    transparent;\n        }\n        ::-webkit-scrollbar-thumb {\n            background-color:
    var(--accent-secondary);\n            border-radius: 10px;\n            border:
    3px solid transparent;\n            background-clip: padding-box;\n        }\n
    \       ::-webkit-scrollbar-thumb:hover {\n            background-color: #0891b2;\n
    \       }\n\n        /* Login Interface */\n        #login-wrapper {\n            position:
    fixed;\n            top: 0; left: 0; width: 100vw; height: 100vh;\n            display:
    flex;\n            align-items: center;\n            justify-content: center;\n
    \           background-color: #03040b;\n            background-image: \n                linear-gradient(rgba(255,
    255, 255, 0.04) 1px, transparent 1px),\n                linear-gradient(90deg,
    rgba(255, 255, 255, 0.04) 1px, transparent 1px);\n            background-size:
    40px 40px;\n            z-index: 1000;\n        }\n\n        .rgb-border-wrapper
    {\n            position: relative;\n            padding: 3px;\n            border-radius:
    23px;\n            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00,
    #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);\n            background-size:
    400%;\n            animation: rgbBorder 10s linear infinite;\n        }\n\n        @keyframes
    rgbBorder {\n            0% { background-position: 0 0; }\n            100% {
    background-position: 400% 0; }\n        }\n\n        #login-container {\n            display:
    flex;\n            flex-direction: column;\n            align-items: center;\n
    \           justify-content: center;\n            width: 100%;\n            min-width:
    380px;\n            max-width: 420px;\n            padding: 2.5rem;\n            border-radius:
    20px;\n            background: #111827;\n            box-shadow: 0 8px 32px 0
    rgba(0, 0, 0, 0.6);\n            text-align: center;\n            animation: fadeIn
    0.5s ease-out;\n        }\n\n        #login-container h1 {\n            font-size:
    1.8rem;\n            margin-bottom: 0.5rem;\n            font-weight: 700;\n            background:
    linear-gradient(135deg, #a78bfa, #22d3ee);\n            -webkit-background-clip:
    text;\n            -webkit-text-fill-color: transparent;\n        }\n\n        .lime-text
    {\n            background: none !important;\n            -webkit-background-clip:
    unset !important;\n            -webkit-text-fill-color: #a3e635 !important;\n
    \           color: #a3e635;\n        }\n\n        #login-container p {\n            color:
    var(--text-muted);\n            font-size: 0.9rem;\n            margin-bottom:
    2rem;\n        }\n\n        .input-group {\n            width: 100%;\n            margin-bottom:
    1.25rem;\n            text-align: left;\n        }\n\n        .input-group label
    {\n            display: block;\n            font-size: 0.8rem;\n            font-weight:
    500;\n            margin-bottom: 0.5rem;\n            color: var(--text-muted);\n
    \           text-transform: uppercase;\n            letter-spacing: 0.05em;\n
    \       }\n\n        .input-group input {\n            width: 100%;\n            padding:
    0.75rem 1rem;\n            border-radius: 8px;\n            background: rgba(15,
    23, 42, 0.6);\n            border: 1px solid var(--glass-border);\n            color:
    white;\n            font-size: 1rem;\n            outline: none;\n            transition:
    border-color 0.2s, box-shadow 0.2s;\n        }\n\n        .input-group input:focus
    {\n            border-color: var(--accent-primary);\n            box-shadow: 0
    0 10px rgba(139, 92, 246, 0.25);\n        }\n\n        .btn {\n            width:
    100%;\n            padding: 0.75rem;\n            border-radius: 8px;\n            border:
    none;\n            background: linear-gradient(135deg, var(--accent-primary),
    #6366f1);\n            color: white;\n            font-size: 1rem;\n            font-weight:
    600;\n            cursor: pointer;\n            transition: transform 0.1s, box-shadow
    0.2s;\n        }\n\n        .btn:hover {\n            box-shadow: 0 0 15px rgba(139,
    92, 246, 0.4);\n            transform: translateY(-1px);\n        }\n\n        .btn:active
    {\n            transform: translateY(0);\n        }\n\n        /* Dashboard Interface
    */\n        #dashboard-container {\n            display: none;\n            width:
    100%;\n            height: 100%;\n            border-radius: 20px;\n            background:
    var(--glass-bg);\n            backdrop-filter: blur(30px);\n            -webkit-backdrop-filter:
    blur(30px);\n            border: none;\n            box-shadow: none;\n            overflow:
    hidden;\n            grid-template-columns: 260px 1fr;\n            animation:
    fadeIn 0.4s ease-out;\n            position: relative;\n            z-index: 1;\n
    \       }\n\n        /* Sidebar */\n        aside {\n            background: rgba(10,
    8, 22, 0.5);\n            border-right: 1px solid var(--glass-border);\n            padding:
    2rem 1.5rem;\n            display: flex;\n            flex-direction: column;\n
    \           justify-content: space-between;\n        }\n\n        .brand {\n            display:
    flex;\n            align-items: center;\n            gap: 0.75rem;\n            margin-bottom:
    2.5rem;\n        }\n\n        .brand svg {\n            width: 32px;\n            height:
    32px;\n            fill: var(--accent-secondary);\n        }\n\n        .brand
    h2 {\n            font-size: 1.25rem;\n            font-weight: 700;\n            letter-spacing:
    -0.02em;\n        }\n\n        .nav-menu {\n            list-style: none;\n            display:
    flex;\n            flex-direction: column;\n            gap: 0.5rem;\n            flex-grow:
    1;\n        }\n\n        .nav-item {\n            display: flex;\n            align-items:
    center;\n            gap: 0.75rem;\n            padding: 0.75rem 1rem;\n            border-radius:
    10px;\n            color: var(--text-muted);\n            text-decoration: none;\n
    \           font-size: 0.95rem;\n            font-weight: 500;\n            cursor:
    pointer;\n            transition: color 0.2s, background 0.2s;\n        }\n\n
    \       .nav-item:hover, .nav-item.active {\n            color: white;\n            background:
    rgba(255, 255, 255, 0.05);\n        }\n\n        .nav-item.active {\n            border-left:
    3px solid var(--accent-primary);\n            border-top-left-radius: 0;\n            border-bottom-left-radius:
    0;\n        }\n\n        .logout-btn {\n            margin-top: auto;\n            color:
    #ef4444;\n        }\n\n        .logout-btn:hover {\n            background: rgba(239,
    68, 68, 0.1);\n        }\n\n        /* Main Content */\n        main {\n            display:
    flex;\n            flex-direction: column;\n            height: 100%;\n            overflow:
    hidden;\n        }\n\n        header {\n            padding: 1.5rem 2rem;\n            border-bottom:
    1px solid var(--glass-border);\n            display: flex;\n            align-items:
    center;\n            justify-content: space-between;\n            background:
    rgba(10, 8, 22, 0.2);\n        }\n\n        .server-info {\n            display:
    flex;\n            align-items: center;\n            gap: 1.5rem;\n        }\n\n
    \       .status-badge {\n            display: inline-flex;\n            align-items:
    center;\n            gap: 0.5rem;\n            padding: 0.35rem 0.75rem;\n            border-radius:
    20px;\n            font-size: 0.8rem;\n            font-weight: 600;\n            text-transform:
    uppercase;\n            background: rgba(239, 68, 68, 0.15);\n            color:
    #f87171;\n        }\n\n        .status-badge.online {\n            background:
    rgba(34, 197, 94, 0.15);\n            color: #4ade80;\n        }\n\n        .status-badge.starting
    {\n            background: rgba(245, 158, 11, 0.15);\n            color: #fbbf24;\n
    \       }\n\n        .status-dot {\n            width: 8px;\n            height:
    8px;\n            border-radius: 50%;\n            background: currentColor;\n
    \           box-shadow: 0 0 8px   currentColor;\n        }\n\n        .stats-row
    {\n            display: flex;\n            align-items: center;\n            gap:
    2rem;\n        }\n\n        .stat-box {\n            font-size: 0.9rem;\n            color:
    var(--text-muted);\n        }\n\n        .stat-box span {\n            color:
    white;\n            font-weight: 600;\n            margin-left: 0.25rem;\n        }\n\n
    \       .stat-bar {\n            width: 120px;\n            height: 6px;\n            background:
    rgba(255, 255, 255, 0.1);\n            border-radius: 3px;\n            overflow:
    hidden;\n            display: inline-block;\n            vertical-align: middle;\n
    \           margin-left: 0.5rem;\n        }\n\n        .stat-progress {\n            height:
    100%;\n            background: linear-gradient(90deg, var(--accent-secondary),
    var(--accent-primary));\n            width: 0%;\n            transition: width
    0.5s;\n        }\n\n        .control-buttons {\n            display: flex;\n            gap:
    0.75rem;\n        }\n\n        /* Power Buttons */\n        .start-btn {\n            background:
    linear-gradient(135deg, #22c55e, #16a34a) !important;\n            color: white;\n
    \           width: auto;\n            padding: 0.5rem 1.25rem;\n            font-size:
    0.9rem;\n            border-radius: 6px;\n        }\n        .start-btn:hover
    {\n            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4) !important;\n        }\n\n
    \       .stop-btn {\n            background: linear-gradient(135deg, #ef4444,
    #dc2626) !important;\n            color: white;\n            width: auto;\n            padding:
    0.5rem 1.25rem;\n            font-size: 0.9rem;\n            border-radius: 6px;\n
    \       }\n        .stop-btn:hover {\n            box-shadow: 0 0 15px rgba(239,
    68, 68, 0.4) !important;\n        }\n\n        .restart-btn {\n            background:
    linear-gradient(135deg, #f59e0b, #d97706);\n            padding: 0.5rem 1rem;\n
    \           font-size: 0.9rem;\n            border-radius: 6px;\n            width:
    auto;\n        }\n        .restart-btn:disabled {\n            background: rgba(255,255,255,0.05);\n
    \           border: 1px solid var(--glass-border);\n            color: var(--text-muted);\n
    \           cursor: not-allowed;\n            box-shadow: none !important;\n            transform:
    none !important;\n        }\n\n        /* View Container */\n        .view {\n
    \           display: none;\n            flex-direction: column;\n            flex-grow:
    1;\n            padding: 2rem;\n            overflow: hidden;\n        }\n\n        .view.active
    {\n            display: flex;\n        }\n\n        /* Console Tab */\n        #terminal
    {\n            flex-grow: 1;\n            background: #020108;\n            border:
    1px solid var(--glass-border);\n            border-radius: 12px;\n            font-family:
    'Fira Code', monospace;\n            font-size: 0.85rem;\n            padding:
    1.25rem;\n            overflow-y: auto;\n            color: #e2e8f0;\n            display:
    flex;\n            flex-direction: column;\n            gap: 0.25rem;\n            box-shadow:
    inset 0 2px 8px rgba(0,0,0,0.8);\n        }\n\n        .log-line {\n            line-height:
    1.4;\n            white-space: pre-wrap;\n            word-break: break-all;\n
    \       }\n\n        .log-line.error { color: #f87171; }\n        .log-line.warn
    { color: #fbbf24; }\n        .log-line.info { color: #94a3b8; }\n\n        .console-input-wrapper
    {\n            margin-top: 1rem;\n            display: flex;\n            gap:
    0.75rem;\n        }\n\n        .console-input-wrapper input {\n            flex-grow:
    1;\n            background: rgba(15, 23, 42, 0.8);\n            border: 1px solid
    var(--glass-border);\n            padding: 0.75rem 1rem;\n            border-radius:
    8px;\n            color: white;\n            font-family: 'Fira Code', monospace;\n
    \           outline: none;\n        }\n\n        .console-input-wrapper input:focus
    {\n            border-color: var(--accent-secondary);\n        }\n\n        .console-send
    {\n            width: 100px;\n            background: linear-gradient(135deg,
    var(--accent-secondary), #0891b2);\n        }\n\n        /* File Manager Tab */\n
    \       .file-actions {\n            display: flex;\n            justify-content:
    space-between;\n            align-items: center;\n            margin-bottom: 1.5rem;\n
    \       }\n\n        .breadcrumbs {\n            font-size: 0.95rem;\n            color:
    var(--text-muted);\n            display: flex;\n            align-items: center;\n
    \           gap: 0.5rem;\n        }\n\n        .breadcrumbs span {\n            cursor:
    pointer;\n        }\n\n        .breadcrumbs span:hover {\n            color: white;\n
    \           text-decoration: underline;\n        }\n\n        .file-buttons {\n
    \           display: flex;\n            gap: 0.75rem;\n        }\n\n        .file-buttons
    button, .file-buttons label {\n            padding: 0.5rem 1rem;\n            background:
    rgba(255, 255, 255, 0.05);\n            border: 1px solid var(--glass-border);\n
    \           border-radius: 6px;\n            font-size: 0.85rem;\n            color:
    white;\n            cursor: pointer;\n            transition: background 0.2s;\n
    \           display: inline-flex;\n            align-items: center;\n            gap:
    0.5rem;\n        }\n\n        .file-buttons button:hover, .file-buttons label:hover
    {\n            background: rgba(255, 255, 255, 0.1);\n        }\n\n        .files-grid-wrapper
    {\n            flex-grow: 1;\n            border: 1px solid var(--glass-border);\n
    \           border-radius: 12px;\n            background: rgba(10, 8, 22, 0.3);\n
    \           overflow-y: auto;\n            position: relative;\n        }\n\n
    \       table {\n            width: 100%;\n            border-collapse: collapse;\n
    \           text-align: left;\n        }\n\n        th, td {\n            padding:
    0.85rem 1.25rem;\n            border-bottom: 1px solid var(--glass-border);\n
    \           font-size: 0.9rem;\n            vertical-align: middle;\n        }\n\n
    \       th {\n            color: var(--text-muted);\n            font-weight:
    500;\n            background: rgba(0, 0, 0, 0.2);\n            position: sticky;\n
    \           top: 0;\n        }\n\n        tr {\n            cursor: pointer;\n
    \           transition: background 0.2s;\n        }\n\n        tbody tr:nth-child(odd)
    {\n            background: rgba(15, 23, 42, 0.4);\n        }\n\n        tbody
    tr:nth-child(even) {\n            background: rgba(30, 41, 59, 0.4);\n        }\n\n
    \       tr:hover {\n            background: rgba(255, 255, 255, 0.08) !important;\n
    \       }\n\n        .file-name-cell {\n            display: flex;\n            align-items:
    center;\n            gap: 0.75rem;\n        }\n\n        .file-icon {\n            width:
    18px;\n            height: 18px;\n            fill: var(--text-muted);\n        }\n\n
    \       .folder-icon {\n            fill: #fbbf24;\n        }\n\n        .actions-cell
    {\n            display: flex;\n            gap: 0.5rem;\n        }\n\n        .action-icon
    {\n            background: none;\n            border: none;\n            cursor:
    pointer;\n            padding: 0.25rem;\n            border-radius: 4px;\n            display:
    flex;\n            align-items: center;\n            justify-content: center;\n
    \       }\n\n        .action-icon:hover {\n            background: rgba(255,255,255,0.08);\n
    \       }\n\n        .action-icon svg {\n            width: 16px;\n            height:
    16px;\n            fill: var(--text-muted);\n        }\n\n        .delete-btn
    svg {\n            fill: #ef4444;\n        }\n\n        /* File Editor Modal */\n
    \       #editor-modal {\n            display: none;\n            position: fixed;\n
    \           top: 0;\n            left: 0;\n            width: 100%;\n            height:
    100%;\n            background: rgba(0, 0, 0, 0.75);\n            backdrop-filter:
    blur(8px);\n            align-items: center;\n            justify-content: center;\n
    \           z-index: 100;\n            padding: 2.5rem;\n        }\n\n        .editor-container
    {\n            width: 100%;\n            max-width: 1100px;\n            height:
    100%;\n            background: #090810;\n            border: 1px solid var(--glass-border);\n
    \           border-radius: 16px;\n            display: flex;\n            flex-direction:
    column;\n            overflow: hidden;\n        }\n\n        .editor-header {\n
    \           padding: 1rem 1.5rem;\n            border-bottom: 1px solid var(--glass-border);\n
    \           display: flex;\n            justify-content: space-between;\n            align-items:
    center;\n            background: rgba(255,255,255,0.02);\n        }\n\n        .editor-header
    h3 {\n            font-size: 1rem;\n            font-weight: 600;\n        }\n\n
    \       .editor-body {\n            flex-grow: 1;\n            position: relative;\n
    \       }\n\n        .editor-body textarea {\n            width: 100%;\n            height:
    100%;\n            background: transparent;\n            border: none;\n            color:
    #e2e8f0;\n            font-family: 'Fira Code', monospace;\n            font-size:
    0.9rem;\n            padding: 1.5rem;\n            resize: none;\n            outline:
    none;\n            line-height: 1.5;\n        }\n\n        .editor-footer {\n
    \           padding: 1rem 1.5rem;\n            border-top: 1px solid var(--glass-border);\n
    \           display: flex;\n            justify-content: flex-end;\n            gap:
    1rem;\n            background: rgba(255,255,255,0.02);\n        }\n\n        .editor-footer
    button {\n            padding: 0.5rem 1.25rem;\n            border-radius: 6px;\n
    \           font-size: 0.85rem;\n            font-weight: 500;\n            cursor:
    pointer;\n        }\n\n        .save-btn {\n            background: linear-gradient(135deg,
    var(--accent-primary), #6366f1);\n            color: white;\n            border:
    none;\n        }\n\n        .cancel-btn {\n            background: transparent;\n
    \           border: 1px solid var(--glass-border);\n            color: var(--text-muted);\n
    \       }\n\n        .cancel-btn:hover {\n            color: white;\n            background:
    rgba(255,255,255,0.02);\n        }\n\n        /* Animations */\n        @keyframes
    fadeIn {\n            from { opacity: 0; transform: scale(0.98); }\n            to
    { opacity: 1; transform: scale(1); }\n        }\n\n        /* Drag and Drop Overlay
    */\n        .drag-overlay {\n            display: none;\n            position:
    absolute;\n            top: 0;\n            left: 0;\n            width: 100%;\n
    \           height: 100%;\n            background: rgba(139, 92, 246, 0.15);\n
    \           border: 2px dashed var(--accent-primary);\n            border-radius:
    12px;\n            align-items: center;\n            justify-content: center;\n
    \           font-size: 1.2rem;\n            font-weight: 600;\n            z-index:
    10;\n            pointer-events: none;\n        }\n\n        /* Floating Backup
    Progress Bar */\n        #backup-progress-bar {\n            display: none;\n
    \           position: fixed;\n            bottom: 24px;\n            left: 50%;\n
    \           transform: translateX(-50%);\n            width: min(520px, 90vw);\n
    \           z-index: 9999;\n            background: #1a0a0a;\n            border:
    2px solid #1a1a1a;\n            border-radius: 16px;\n            padding: 14px
    20px;\n            box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 20px rgba(220,
    38, 38, 0.2);\n            backdrop-filter: blur(12px);\n            -webkit-backdrop-filter:
    blur(12px);\n        }\n        #backup-progress-bar .bp-header {\n            display:
    flex;\n            justify-content: space-between;\n            align-items: center;\n
    \           margin-bottom: 10px;\n        }\n        #backup-progress-bar .bp-title
    {\n            font-size: 0.82rem;\n            font-weight: 600;\n            color:
    #fca5a5;\n            letter-spacing: 0.04em;\n            text-transform: uppercase;\n
    \       }\n        #backup-progress-bar .bp-percent {\n            font-family:
    var(--font-mono, monospace);\n            font-size: 0.85rem;\n            font-weight:
    700;\n            color: #ef4444;\n        }\n        #backup-progress-bar .bp-track
    {\n            width: 100%;\n            height: 8px;\n            background:
    rgba(255,255,255,0.06);\n            border-radius: 999px;\n            overflow:
    hidden;\n        }\n        #backup-progress-bar .bp-fill {\n            height:
    100%;\n            background: linear-gradient(90deg, #7f1d1d, #ef4444, #f87171);\n
    \           border-radius: 999px;\n            width: 0%;\n            transition:
    width 0.8s ease;\n            box-shadow: 0 0 10px rgba(239, 68, 68, 0.6);\n        }\n
