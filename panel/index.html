<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #06050f;
            --accent-primary: #8b5cf6;
            --accent-secondary: #06b6d4;
            --glass-bg: rgba(17, 25, 40, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1e1b4b, #0f172a, var(--bg-main));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Login Interface */
        #login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            border-radius: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        #login-container h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #login-container p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .input-group {
            width: 100%;
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.25);
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--accent-primary), #6366f1);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .btn:hover {
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Dashboard Interface */
        #dashboard-container {
            display: none;
            width: 95vw;
            max-width: 1400px;
            height: 90vh;
            border-radius: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            overflow: hidden;
            grid-template-columns: 260px 1fr;
            animation: fadeIn 0.4s ease-out;
        }

        /* Sidebar */
        aside {
            background: rgba(10, 8, 22, 0.5);
            border-right: 1px solid var(--glass-border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }

        .brand svg {
            width: 32px;
            height: 32px;
            fill: var(--accent-secondary);
        }

        .brand h2 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            border-left: 3px solid var(--accent-primary);
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        .logout-btn {
            margin-top: auto;
            color: #ef4444;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* Main Content */
        main {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 8, 22, 0.2);
        }

        .server-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .status-badge.online {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
        }

        .status-badge.starting {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 8px   currentColor;
        }

        .stats-row {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .stat-box {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .stat-box span {
            color: white;
            font-weight: 600;
            margin-left: 0.25rem;
        }

        .stat-bar {
            width: 120px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-left: 0.5rem;
        }

        .stat-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary));
            width: 0%;
            transition: width 0.5s;
        }

        .control-buttons {
            display: flex;
            gap: 0.75rem;
        }

        /* Power Buttons */
        .start-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a) !important;
            color: white;
            width: auto;
            padding: 0.5rem 1.25rem;
            font-size: 0.9rem;
            border-radius: 6px;
        }
        .start-btn:hover {
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4) !important;
        }

        .stop-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626) !important;
            color: white;
            width: auto;
            padding: 0.5rem 1.25rem;
            font-size: 0.9rem;
            border-radius: 6px;
        }
        .stop-btn:hover {
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4) !important;
        }

        .restart-btn {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            border-radius: 6px;
            width: auto;
        }
        .restart-btn:disabled {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none !important;
            transform: none !important;
        }

        /* View Container */
        .view {
            display: none;
            flex-direction: column;
            flex-grow: 1;
            padding: 2rem;
            overflow: hidden;
        }

        .view.active {
            display: flex;
        }

        /* Console Tab */
        #terminal {
            flex-grow: 1;
            background: #020108;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            padding: 1.25rem;
            overflow-y: auto;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }

        .log-line {
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-line.error { color: #f87171; }
        .log-line.warn { color: #fbbf24; }
        .log-line.info { color: #94a3b8; }

        .console-input-wrapper {
            margin-top: 1rem;
            display: flex;
            gap: 0.75rem;
        }

        .console-input-wrapper input {
            flex-grow: 1;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--glass-border);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            color: white;
            font-family: 'Fira Code', monospace;
            outline: none;
        }

        .console-input-wrapper input:focus {
            border-color: var(--accent-secondary);
        }

        .console-send {
            width: 100px;
            background: linear-gradient(135deg, var(--accent-secondary), #0891b2);
        }

        /* File Manager Tab */
        .file-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .breadcrumbs {
            font-size: 0.95rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .breadcrumbs span {
            cursor: pointer;
        }

        .breadcrumbs span:hover {
            color: white;
            text-decoration: underline;
        }

        .file-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .file-buttons button, .file-buttons label {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .file-buttons button:hover, .file-buttons label:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .files-grid-wrapper {
            flex-grow: 1;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: rgba(10, 8, 22, 0.3);
            overflow-y: auto;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 0.85rem 1.25rem;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.9rem;
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            background: rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 0;
        }

        tr {
            cursor: pointer;
            transition: background 0.2s;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .file-name-cell {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .file-icon {
            width: 18px;
            height: 18px;
            fill: var(--text-muted);
        }

        .folder-icon {
            fill: #fbbf24;
        }

        .actions-cell {
            display: flex;
            gap: 0.5rem;
        }

        .action-icon {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-icon:hover {
            background: rgba(255,255,255,0.08);
        }

        .action-icon svg {
            width: 16px;
            height: 16px;
            fill: var(--text-muted);
        }

        .delete-btn svg {
            fill: #ef4444;
        }

        /* File Editor Modal */
        #editor-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 2.5rem;
        }

        .editor-container {
            width: 100%;
            max-width: 1100px;
            height: 100%;
            background: #090810;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .editor-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
        }

        .editor-header h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        .editor-body {
            flex-grow: 1;
            position: relative;
        }

        .editor-body textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #e2e8f0;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            padding: 1.5rem;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        .editor-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            background: rgba(255,255,255,0.02);
        }

        .editor-footer button {
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
        }

        .save-btn {
            background: linear-gradient(135deg, var(--accent-primary), #6366f1);
            color: white;
            border: none;
        }

        .cancel-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
        }

        .cancel-btn:hover {
            color: white;
            background: rgba(255,255,255,0.02);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Drag and Drop Overlay */
        .drag-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(139, 92, 246, 0.15);
            border: 2px dashed var(--accent-primary);
            border-radius: 12px;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 600;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Login Container -->
    <div id="login-container">
        <h1>Minecraft Control Panel</h1>
        <p>Enter administrative credentials to log in.</p>
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="e.g. admin">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn" onclick="login()">Sign In</button>
    </div>

    <!-- Dashboard Container -->
    <div id="dashboard-container">
        <aside>
            <div>
                <div class="brand">
                    <svg viewBox="0 0 24 24">
                        <path d="M4 2h16a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm0 2v4h4V4H4zm6 0v4h4V4h-4zm6 0v4h4V4h-4zM4 10v4h4v-4H4zm6 0v4h4v-4h-4zm6 0v4h4v-4h-4zM4 16v4h4v-4H4zm6 0v4h4v-4h-4zm6 0v4h4v-4h-4z"/>
                    </svg>
                    <h2>NeuroXYZ Panel</h2>
                </div>
                <ul class="nav-menu">
                    <li class="nav-item active" onclick="switchView('console', this)">
                        <svg style="width: 18px; height: 18px; fill: currentColor; margin-right: 0.5rem;" viewBox="0 0 24 24">
                            <path d="M20 19H4c-1.1 0-2-.9-2-2V7c0-1.1.9-2 2-2h16c1.1 0 2 .9 2 2v10c0 1.1-.9 2-2 2zM4 7v10h16V7H4zm3 2h2v2H7V9zm0 4h6v2H7v-2zm8-4h2v2h-2V9z"/>
                        </svg>
                        Console
                    </li>
                    <li class="nav-item" onclick="switchView('files', this)">
                        <svg style="width: 18px; height: 18px; fill: currentColor; margin-right: 0.5rem;" viewBox="0 0 24 24">
                            <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
                        </svg>
                        File Manager
                    </li>
                </ul>
            </div>
            <div class="nav-item logout-btn" onclick="logout()">
                <svg style="width: 18px; height: 18px; fill: currentColor; margin-right: 0.5rem;" viewBox="0 0 24 24">
                    <path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/>
                </svg>
                Logout
            </div>
        </aside>

        <main>
            <header>
                <div class="server-info">
                    <h2 style="font-weight: 600;">Minecraft Server</h2>
                    <div id="status-badge" class="status-badge">
                        <div class="status-dot"></div>
                        <span id="status-text">Checking...</span>
                    </div>
                </div>
                <div class="stats-row">
                    <div class="stat-box">
                        Players: <span id="players-stat">0/20</span>
                    </div>
                    <div class="stat-box">
                        RAM: <span id="ram-text">0 GB</span>
                        <div class="stat-bar"><div id="ram-progress" class="stat-progress"></div></div>
                    </div>
                    <div class="control-buttons">
                        <button id="power-btn" class="btn start-btn" onclick="togglePower()">Start</button>
                        <button id="restart-btn" class="btn restart-btn" onclick="restartServer()">Restart</button>
                    </div>
                </div>
            </header>

            <!-- Console View -->
            <div id="view-console" class="view active">
                <div id="terminal"></div>
                <div class="console-input-wrapper">
                    <input type="text" id="console-cmd" placeholder="Type a minecraft command (e.g. op name, whitelist add name)..." onkeydown="if(event.key==='Enter') sendCommand()">
                    <button class="btn console-send" onclick="sendCommand()">Send</button>
                </div>
            </div>

            <!-- Files View -->
            <div id="view-files" class="view">
                <div class="file-actions">
                    <div class="breadcrumbs" id="breadcrumbs">
                        <span onclick="loadDir('')">Root</span>
                    </div>
                    <div class="file-buttons">
                        <button onclick="newFolder()">+ New Folder</button>
                        <button onclick="newFile()">+ New File</button>
                        <label for="file-upload">
                            ↑ Upload File
                            <input type="file" id="file-upload" style="display:none;" onchange="handleFileUpload(this.files)">
                        </label>
                    </div>
                </div>
                <div class="files-grid-wrapper" id="files-drop-zone">
                    <div class="drag-overlay" id="drag-overlay">Drop files here to upload!</div>
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Size</th>
                                <th>Last Modified</th>
                                <th style="width: 100px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="files-list"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Editor Modal -->
    <div id="editor-modal">
        <div class="editor-container">
            <div class="editor-header">
                <h3 id="editor-filename">Editing File</h3>
            </div>
            <div class="editor-body">
                <textarea id="editor-textarea" spellcheck="false"></textarea>
            </div>
            <div class="editor-footer">
                <button class="cancel-btn" onclick="closeEditor()">Cancel</button>
                <button class="save-btn" onclick="saveFile()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        let currentPath = '';
        let editingFilePath = '';
        let sseSource = null;
        let currentStatus = 'offline';

        // Check session on page load
        window.onload = () => {
            if (document.cookie.includes('panel_session=')) {
                showDashboard();
            }
        };

        function showDashboard() {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('dashboard-container').style.display = 'grid';
            startStatusPolling();
            startLogStream();
            loadDir('');
        }

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (data.success) {
                    showDashboard();
                } else {
                    alert('Error: ' + (data.error || 'Authentication failed'));
                }
            } catch (e) {
                alert('Login request failed');
            }
        }

        async function logout() {
            await fetch('/api/logout');
            document.cookie = "panel_session=; Path=/; Max-Age=0;";
            location.reload();
        }

        // Dashboard View Switcher
        function switchView(viewId, element) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            document.getElementById('view-' + viewId).classList.add('active');
            element.classList.add('active');
        }

        // Status Polling
        function startStatusPolling() {
            updateStatus();
            setInterval(updateStatus, 5000);
        }

        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                if (res.status === 401) return logout();
                const data = await res.json();
                
                const badge = document.getElementById('status-badge');
                const text = document.getElementById('status-text');
                const powerBtn = document.getElementById('power-btn');
                const restartBtn = document.getElementById('restart-btn');
                
                currentStatus = data.status;

                if (data.status === 'online') {
                    badge.className = 'status-badge online';
                    text.innerText = 'Online';
                    
                    powerBtn.className = 'btn stop-btn';
                    powerBtn.innerText = 'Stop';
                    powerBtn.disabled = false;
                    restartBtn.disabled = false;
                } else if (data.status === 'starting') {
                    badge.className = 'status-badge starting';
                    text.innerText = 'Starting...';
                    
                    powerBtn.className = 'btn stop-btn';
                    powerBtn.innerText = 'Stop';
                    powerBtn.disabled = false;
                    restartBtn.disabled = true;
                } else {
                    badge.className = 'status-badge';
                    text.innerText = 'Offline';
                    
                    powerBtn.className = 'btn start-btn';
                    powerBtn.innerText = 'Start';
                    powerBtn.disabled = false;
                    restartBtn.disabled = true;
                }

                document.getElementById('players-stat').innerText = `${data.players.online}/${data.players.max}`;
                
                const usedGB = (data.memory.used / (1024 * 1024 * 1024)).toFixed(1);
                const totalGB = (data.memory.total / (1024 * 1024 * 1024)).toFixed(1);
                document.getElementById('ram-text').innerText = `${usedGB} / ${totalGB} GB`;
                document.getElementById('ram-progress').style.width = `${data.memory.percent}%`;
            } catch (e) {
                const badge = document.getElementById('status-badge');
                const text = document.getElementById('status-text');
                badge.className = 'status-badge';
                text.innerText = 'Connection Error';
            }
        }

        async function togglePower() {
            const powerBtn = document.getElementById('power-btn');
            powerBtn.disabled = true;
            
            const action = (currentStatus === 'online' || currentStatus === 'starting') ? 'stop' : 'start';
            const confirmMsg = action === 'stop' 
                ? 'Are you sure you want to STOP the Minecraft server?'
                : 'Are you sure you want to START the Minecraft server?';
                
            if (!confirm(confirmMsg)) {
                powerBtn.disabled = false;
                return;
            }
            
            try {
                const res = await fetch(`/api/${action}`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    setTimeout(updateStatus, 1000);
                } else {
                    alert('Power action failed: ' + (data.error || 'Unknown error'));
                    powerBtn.disabled = false;
                }
            } catch (e) {
                alert('Request failed');
                powerBtn.disabled = false;
            }
        }

        // Log Streaming (SSE)
        function startLogStream() {
            if (sseSource) sseSource.close();
            const term = document.getElementById('terminal');
            term.innerHTML = '<div class="log-line info">Connecting to server log stream...</div>';

            sseSource = new EventSource('/api/logs');
            sseSource.onmessage = (event) => {
                const logData = JSON.parse(event.data);
                const lines = logData.split('\n');
                lines.forEach(line => {
                    if (!line.trim()) return;
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'log-line';
                    
                    if (line.includes('[Server thread/WARN]') || line.includes('WARN')) {
                        lineDiv.classList.add('warn');
                    } else if (line.includes('[Server thread/ERROR]') || line.includes('ERROR')) {
                        lineDiv.classList.add('error');
                    } else {
                        lineDiv.classList.add('info');
                    }

                    lineDiv.innerText = line;
                    term.appendChild(lineDiv);
                });
                term.scrollTop = term.scrollHeight;
            };

            sseSource.onerror = () => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'log-line error';
                lineDiv.innerText = '[System] Log stream disconnected. Retrying...';
                term.appendChild(lineDiv);
                term.scrollTop = term.scrollHeight;
            };
        }

        async function sendCommand() {
            const input = document.getElementById('console-cmd');
            const cmd = input.value.trim();
            if (!cmd) return;
            input.value = '';

            const term = document.getElementById('terminal');
            const echoDiv = document.createElement('div');
            echoDiv.className = 'log-line';
            echoDiv.style.color = '#38bdf8';
            echoDiv.innerText = '> ' + cmd;
            term.appendChild(echoDiv);
            term.scrollTop = term.scrollHeight;

            try {
                const res = await fetch('/api/console', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                const data = await res.json();
                if (data.response) {
                    const respDiv = document.createElement('div');
                    respDiv.className = 'log-line';
                    respDiv.style.color = '#34d399';
                    respDiv.innerText = data.response;
                    term.appendChild(respDiv);
                } else if (data.error) {
                    const errDiv = document.createElement('div');
                    errDiv.className = 'log-line error';
                    errDiv.innerText = 'RCON Error: ' + data.error;
                    term.appendChild(errDiv);
                }
                term.scrollTop = term.scrollHeight;
            } catch (e) {
                const errDiv = document.createElement('div');
                errDiv.className = 'log-line error';
                errDiv.innerText = 'Failed to communicate with RCON.';
                term.appendChild(errDiv);
                term.scrollTop = term.scrollHeight;
            }
        }

        async function restartServer() {
            if (!confirm('Are you sure you want to RESTART the Minecraft server?')) return;
            const restartBtn = document.getElementById('restart-btn');
            restartBtn.disabled = true;
            try {
                const res = await fetch('/api/restart', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    setTimeout(updateStatus, 1500);
                } else {
                    alert('Restart failed');
                    restartBtn.disabled = false;
                }
            } catch (e) {
                alert('Failed to send restart command');
                restartBtn.disabled = false;
            }
        }

        // File Manager Actions
        async function loadDir(pathStr) {
            currentPath = pathStr;
            updateBreadcrumbs();
            const list = document.getElementById('files-list');
            list.innerHTML = '<tr><td colspan="4" style="text-align:center;">Loading directory files...</td></tr>';
            
            try {
                const res = await fetch('/api/files?path=' + encodeURIComponent(pathStr));
                const data = await res.json();
                if (!data.success) {
                    list.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#f87171;">Error: ${data.error}</td></tr>`;
                    return;
                }

                list.innerHTML = '';
                
                if (currentPath !== '') {
                    const parentPath = currentPath.substring(0, currentPath.lastIndexOf('/')) || '';
                    const tr = document.createElement('tr');
                    tr.onclick = () => loadDir(parentPath);
                    tr.innerHTML = `
                        <td class="file-name-cell">
                            <svg class="file-icon folder-icon" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                            <span>..</span>
                        </td>
                        <td>-</td>
                        <td>-</td>
                        <td>-</td>
                    `;
                    list.appendChild(tr);
                }

                if (data.files.length === 0 && currentPath === '') {
                    list.innerHTML = '<tr><td colspan="4" style="text-align:center;">Directory is empty.</td></tr>';
                    return;
                }

                data.files.forEach(file => {
                    const tr = document.createElement('tr');
                    const fullFilePath = currentPath ? `${currentPath}/${file.name}` : file.name;
                    
                    if (file.isDir) {
                        tr.onclick = () => loadDir(fullFilePath);
                    } else {
                        tr.onclick = () => openFile(fullFilePath);
                    }

                    const dateStr = file.mtime ? new Date(file.mtime).toLocaleString() : '-';
                    const sizeStr = file.isDir ? '-' : formatBytes(file.size);
                    
                    tr.innerHTML = `
                        <td class="file-name-cell">
                            ${file.isDir 
                                ? `<svg class="file-icon folder-icon" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>`
                                : `<svg class="file-icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>`
                            }
                            <span>${file.name}</span>
                        </td>
                        <td>${sizeStr}</td>
                        <td>${dateStr}</td>
                        <td class="actions-cell" onclick="event.stopPropagation()">
                            ${!file.isDir ? `
                            <button class="action-icon" title="Download" onclick="downloadFile('${fullFilePath}')">
                                <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
                            </button>` : ''}
                            <button class="action-icon delete-btn" title="Delete" onclick="deleteItem('${fullFilePath}', ${file.isDir})">
                                <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                            </button>
                        </td>
                    `;
                    list.appendChild(tr);
                });
            } catch (e) {
                list.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#f87171;">Request error loading directory</td></tr>`;
            }
        }

        function updateBreadcrumbs() {
            const bc = document.getElementById('breadcrumbs');
            bc.innerHTML = '<span onclick="loadDir(\'\')">Root</span>';
            if (!currentPath) return;

            const parts = currentPath.split('/');
            let cumulative = '';
            parts.forEach(part => {
                cumulative = cumulative ? `${cumulative}/${part}` : part;
                const pathVal = cumulative;
                bc.innerHTML += ` &gt; <span onclick="loadDir('${pathVal}')">${part}</span>`;
            });
        }

        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        // Create operations
        async function newFolder() {
            const name = prompt('Enter new folder name:');
            if (!name) return;
            const pathStr = currentPath ? `${currentPath}/${name}` : name;
            try {
                const res = await fetch('/api/mkdir', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: pathStr })
                });
                const data = await res.json();
                if (data.success) {
                    loadDir(currentPath);
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (e) {
                alert('Request failed');
            }
        }

        async function newFile() {
            const name = prompt('Enter new file name:');
            if (!name) return;
            const pathStr = currentPath ? `${currentPath}/${name}` : name;
            try {
                const res = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: pathStr, content: '' })
                });
                const data = await res.json();
                if (data.success) {
                    loadDir(currentPath);
                    openFile(pathStr);
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (e) {
                alert('Request failed');
            }
        }

        async function deleteItem(pathStr, isDir) {
            if (!confirm(`Are you sure you want to delete this ${isDir ? 'folder' : 'file'}?\n${pathStr}`)) return;
            try {
                const res = await fetch('/api/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: pathStr })
                });
                const data = await res.json();
                if (data.success) {
                    loadDir(currentPath);
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (e) {
                alert('Request failed');
            }
        }

        function downloadFile(pathStr) {
            window.open('/api/file?path=' + encodeURIComponent(pathStr), '_blank');
        }

        // Editor Actions
        async function openFile(pathStr) {
            editingFilePath = pathStr;
            document.getElementById('editor-filename').innerText = `Editing: ${pathStr.split('/').pop()}`;
            const textarea = document.getElementById('editor-textarea');
            textarea.value = 'Loading file contents...';
            document.getElementById('editor-modal').style.display = 'flex';

            try {
                const res = await fetch('/api/file?path=' + encodeURIComponent(pathStr));
                if (res.status === 200) {
                    textarea.value = await res.text();
                } else {
                    textarea.value = 'Failed to load file contents.';
                }
            } catch (e) {
                textarea.value = 'Network error fetching file content.';
            }
        }

        function closeEditor() {
            document.getElementById('editor-modal').style.display = 'none';
            editingFilePath = '';
        }

        async function saveFile() {
            const content = document.getElementById('editor-textarea').value;
            try {
                const res = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: editingFilePath, content })
                });
                const data = await res.json();
                if (data.success) {
                    closeEditor();
                    loadDir(currentPath);
                } else {
                    alert('Error saving file: ' + data.error);
                }
            } catch (e) {
                alert('Failed to save file.');
            }
        }

        // Upload files
        async function handleFileUpload(files) {
            if (files.length === 0) return;
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const pathStr = currentPath ? `${currentPath}/${file.name}` : file.name;
                try {
                    await fetch('/api/upload?path=' + encodeURIComponent(pathStr), {
                        method: 'POST',
                        body: file
                    });
                } catch (e) {
                    alert(`Failed to upload ${file.name}`);
                }
            }
            loadDir(currentPath);
        }

        // Drag and Drop
        const dropZone = document.getElementById('files-drop-zone');
        const dragOverlay = document.getElementById('drag-overlay');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dragOverlay.style.display = 'flex';
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragOverlay.style.display = 'none';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dragOverlay.style.display = 'none';
            handleFileUpload(e.dataTransfer.files);
        });
    </script>
</body>
</html>
